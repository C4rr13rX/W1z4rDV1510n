instance_id = "coding-small-a"
identity_path = "brains/coding_small.identity.toml"
data_dir = "runtime/brains/coding-small-a"

[resource_budget]
# Keep the hot set bounded while allowing the curriculum to grow into the
# attached SSD cold tier.  The prior 256 MiB / 500k-neuron ceiling is below
# the observed size of the foundation curricula alone.
max_resident_bytes = 2147483648
max_neurons = 10000000
max_propagation_steps = 64
max_learning_steps_per_second = 1000

# Do not feed hashed internal traces into prompt/context sensory pools.
# Feedback observations participate in Hebbian moments by design; targeting
# these pools polluted supervised prompt -> response fingerprints and caused
# a measured toddler collapse from 32/32 to 0/32.  A future recurrent coding
# topology should use a dedicated meta/working-memory pool instead.
