name = "coding_debug"
version = "0.1.0"
binding_emergence_threshold = 3
moment_history_window = 256

# Every pool remains raw-byte atomized.  Different pools extract different
# contextual streams by receiving different evidence, not by substituting an
# opaque vocabulary for character atoms.
[[pools]]
name = "instruction"
id = 1
prototype = "byte-passthrough"
atom_encoding_prefix = "instruction"
kind = "SensoryInput"
frame_rate = 1
recent_atoms_window = 65536
max_concept_member_count = 32
concept_emergence_threshold = 3
decay_rate = 0.00002
prune_floor = 0.001

