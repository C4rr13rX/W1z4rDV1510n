name = "coding_debug"
version = "0.1.0"
binding_emergence_threshold = 3
moment_history_window = 256

# The lossless source and language streams remain raw-byte atomized. Parallel
# derived feature pools may expose deterministic structure, but never replace
# or sever their grounding in the raw character substrate.
[[pools]]
name = "instruction"
id = 1
prototype = "byte-passthrough"
atom_encoding_prefix = "instruction"
kind = "SensoryInput"
frame_rate = 1
recent_atoms_window = 65536
max_concept_member_count = 32
concept_emergence_threshold = 6
decay_rate = 0.00002
prune_floor = 0.001

