<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W1z4rD V1510n — Neural Cow World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: monospace; }
canvas { display: block; }
#overlay {
  position: fixed; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 5px;
  pointer-events: none; z-index: 10; width: 220px;
}
#feed-wrap {
  width: 220px; height: 124px; overflow: hidden;
  border: 1px solid rgba(0,255,80,0.5); background: #111;
  position: relative;
}
#feed-wrap img { width: 100%; height: 100%; object-fit: cover; }
#feed-label {
  position: absolute; bottom: 3px; left: 4px;
  color: rgba(0,255,80,0.7); font-size: 9px; letter-spacing: 1px;
}
#status-box {
  background: rgba(0,0,0,0.7); padding: 5px 8px;
  border: 1px solid rgba(0,255,80,0.3); font-size: 11px; line-height: 1.7;
}
.sl { color: #0f8; } .sv { color: #cfc; } .sa { color: #ff0; font-weight: bold; }
.sd { color: #555; }
#labels-box {
  background: rgba(0,0,0,0.6); padding: 4px 8px;
  border: 1px solid rgba(0,255,80,0.2);
  font-size: 10px; line-height: 1.7; display: none;
}
.lbl { color: #0d9; }
#narrative-box {
  background: rgba(0,0,0,0.6); padding: 4px 8px;
  border: 1px solid rgba(60,180,255,0.3);
  font-size: 10px; color: #8ef; line-height: 1.5; display: none;
}
#crosshair {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.4); font-size: 22px;
  pointer-events: none; display: none;
}
#hint {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35); font-size: 12px; pointer-events: none;
}
#lod-badge {
  position: fixed; bottom: 14px; right: 14px;
  color: rgba(0,255,80,0.35); font-size: 11px; pointer-events: none;
}
</style>
</head>
<body>
<div id="overlay">
  <div id="feed-wrap">
    <img id="video-feed" alt="">
    <div id="feed-label">NEURAL SENSOR FEED</div>
  </div>
  <div id="status-box">
    <span class="sl">STATE </span><span id="s-anim" class="sa">connecting</span><br>
    <span class="sl">CONF  </span><span id="s-conf" class="sv">—</span><br>
    <span class="sl">SPEED </span><span id="s-spd"  class="sv">—</span><br>
    <span class="sl">FPS   </span><span id="s-fps"  class="sv">—</span>
  </div>
  <div id="labels-box"><div class="sd">FABRIC CONCEPTS</div><div id="label-list"></div></div>
  <div id="narrative-box"><span id="narrative-text"></span></div>
</div>
<div id="crosshair">+</div>
<div id="hint">Click to enter free-roam · WASD move · Shift sprint · Esc exit</div>
<div id="lod-badge">LOD: HIGH</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script>
'use strict';

// ─── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// ─── Camera ────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
// Side-view starting position — approximates the video camera angle
camera.position.set(12, 2.2, 3);
let camYaw = -1.3, camPitch = -0.1;
camera.rotation.order = 'YXZ';
camera.rotation.y = camYaw;
camera.rotation.x = camPitch;

// ─── Shared video texture ──────────────────────────────────────────────────
const videoTexture = new THREE.Texture();
videoTexture.minFilter = THREE.LinearFilter;
videoTexture.magFilter = THREE.LinearFilter;
const videoImg = new Image();
videoImg.onload = () => {
  videoTexture.image = videoImg;
  videoTexture.needsUpdate = true;
};

function updateVideoTexture(dataURL) {
  videoImg.src = dataURL;
}

// ─── Background plane (fills viewport with the video frame) ───────────────
const bgGeo = new THREE.PlaneGeometry(1, 1);
const bgMat = new THREE.MeshBasicMaterial({ map: videoTexture, depthWrite: false });
const bgPlane = new THREE.Mesh(bgGeo, bgMat);
bgPlane.renderOrder = -1;
scene.add(bgPlane);

function updateBackground() {
  const dist  = 80;
  const ahead = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  bgPlane.position.copy(camera.position).addScaledVector(ahead, dist);
  bgPlane.lookAt(camera.position);
  const h = 2 * dist * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  bgPlane.scale.set(h * camera.aspect, h, 1);
}

// ─── Lighting ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const sun = new THREE.DirectionalLight(0xfffce0, 0.9);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -60;
sun.shadow.camera.right = sun.shadow.camera.top = 60;
scene.add(sun);

// ─── Ground ────────────────────────────────────────────────────────────────
(function() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3a6e32';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 3000; i++) {
    const g = Math.floor(Math.random() * 25);
    ctx.fillStyle = `rgb(${40+g},${90+g},${36+g})`;
    ctx.fillRect(Math.random()*256, Math.random()*256, 2, 3);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(80, 80);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshLambertMaterial({ map: tex })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  scene.add(mesh);
})();

// ─── World-space video projection shader ──────────────────────────────────
// Projects the video frame onto the cow mesh using the cow's local coordinate
// system so the texture always maps: head→right, tail→left, top→up regardless
// of the cow's world orientation.  The fragment shader receives the cow root's
// inverse world matrix and maps each fragment to the 2D side-projection UV.
const cowShader = {
  uniforms: {
    tVideo:      { value: videoTexture },
    uInvCow:     { value: new THREE.Matrix4() },  // inverse of cowRoot.matrixWorld
    uCowMinX:    { value: -1.4 },  // tail end in cow-local X
    uCowSpanX:   { value:  3.0 },  // total length
    uCowMinY:    { value:  0.0 },  // ground (hooves)
    uCowSpanY:   { value:  2.4 },  // total height to head tip
    // Texture crop: which portion of the frame corresponds to the cow
    uTexOffU:    { value: 0.05 },   // left margin
    uTexScaleU:  { value: 0.90 },   // horizontal extent
    uTexOffV:    { value: 0.08 },   // bottom margin (ground)
    uTexScaleV:  { value: 0.82 },   // vertical extent (up to sky)
    uFallback:   { value: new THREE.Color(0xe8e4db) }, // off-white for clipped areas
  },
  vertexShader: `
    varying vec4 vWorldPos;
    void main() {
      vWorldPos = modelMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * viewMatrix * vWorldPos;
    }
  `,
  fragmentShader: `
    uniform sampler2D tVideo;
    uniform mat4  uInvCow;
    uniform float uCowMinX, uCowSpanX;
    uniform float uCowMinY, uCowSpanY;
    uniform float uTexOffU, uTexScaleU;
    uniform float uTexOffV, uTexScaleV;
    uniform vec3  uFallback;
    varying vec4 vWorldPos;

    void main() {
      // Transform fragment to cow-root local space
      vec3 local = (uInvCow * vWorldPos).xyz;

      // Map cow local coords to [0,1] UV
      float u = (local.x - uCowMinX) / uCowSpanX;   // 0=tail, 1=head
      float v = (local.y - uCowMinY) / uCowSpanY;   // 0=hooves, 1=top

      // Clamp to valid range; blend to fallback at edges
      float inBounds = step(0.0, u) * step(u, 1.0) * step(0.0, v) * step(v, 1.0);
      float edgeFade = smoothstep(0.0, 0.04, u) * smoothstep(1.0, 0.96, u)
                     * smoothstep(0.0, 0.04, v) * smoothstep(1.0, 0.96, v);

      // Map to the cow's region in the video frame
      float su = uTexOffU + u * uTexScaleU;
      float sv = uTexOffV + v * uTexScaleV;

      vec4 texColor = texture2D(tVideo, vec2(su, sv));
      vec4 fallback  = vec4(uFallback, 1.0);

      gl_FragColor = mix(fallback, texColor, inBounds * edgeFade);
    }
  `,
};

function makeCowMat() {
  return new THREE.ShaderMaterial({
    uniforms:       THREE.UniformsUtils.clone(cowShader.uniforms),
    vertexShader:   cowShader.vertexShader,
    fragmentShader: cowShader.fragmentShader,
    side:           THREE.DoubleSide,
  });
}

// ─── Cow builder ──────────────────────────────────────────────────────────
const HOOF_MAT = new THREE.MeshLambertMaterial({ color: 0x2a1a08 });
const PINK_MAT = new THREE.MeshLambertMaterial({ color: 0xf5a898 });
const EYE_MAT  = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });

function buildCow(lod) {
  const segs = lod === 'low' ? 5 : lod === 'med' ? 7 : 12;
  const root = new THREE.Group();
  const mat  = makeCowMat();

  function mesh(geo) {
    const m = new THREE.Mesh(geo, mat);
    m.castShadow = true;
    return m;
  }

  // ── Body (elongated sphere) ────────────────────────────────────────────
  const body = mesh(new THREE.SphereGeometry(1.0, segs * 2, segs));
  body.scale.set(1.22, 0.54, 0.68);
  body.position.y = 1.62;
  root.add(body);

  // ── Neck ──────────────────────────────────────────────────────────────
  const neckPivot = new THREE.Object3D();
  neckPivot.position.set(1.15, 0.22, 0); // front of body in root space
  body.add(neckPivot);
  const neck = mesh(new THREE.CylinderGeometry(0.18, 0.24, 0.62, segs));
  neck.rotation.z = -0.5;
  neck.position.set(0.28, 0.16, 0);
  neckPivot.add(neck);

  // ── Head ──────────────────────────────────────────────────────────────
  const headJoint = new THREE.Object3D();
  headJoint.position.set(0.52, 0.34, 0);
  neckPivot.add(headJoint);

  const head = mesh(new THREE.SphereGeometry(0.36, segs * 2, segs));
  head.scale.set(1.18, 0.92, 0.90);
  head.position.set(0.28, 0, 0);
  headJoint.add(head);

  // Snout
  const snout = mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.30, segs));
  snout.rotation.z = Math.PI / 2;
  snout.position.set(0.38, -0.04, 0);
  head.add(snout);

  // Nose pad
  const nosePad = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.18, 0.02, segs),
    PINK_MAT
  );
  nosePad.rotation.z = Math.PI / 2;
  nosePad.position.set(0.16, -0.04, 0);
  snout.add(nosePad);

  // Nostrils
  for (const z of [0.07, -0.07]) {
    const n = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), EYE_MAT);
    n.position.set(0.08, -0.04, z);
    snout.add(n);
  }

  // Eyes
  if (lod !== 'low') {
    for (const z of [0.28, -0.28]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.065, 6, 6), EYE_MAT);
      eye.position.set(0.18, 0.1, z);
      head.add(eye);
    }
    // Ears
    for (const z of [0.32, -0.32]) {
      const ear = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 6, 5),
        PINK_MAT
      );
      ear.scale.set(0.5, 1.1, 0.4);
      ear.position.set(-0.12, 0.30, z);
      ear.rotation.z = z > 0 ? 0.3 : -0.3;
      head.add(ear);
    }
  }

  // Horns (high LOD)
  if (lod === 'high') {
    for (const z of [0.22, -0.22]) {
      const horn = new THREE.Mesh(
        new THREE.CylinderGeometry(0.01, 0.035, 0.28, 5),
        new THREE.MeshLambertMaterial({ color: 0xd8c060 })
      );
      horn.position.set(-0.08, 0.38, z);
      horn.rotation.set(z > 0 ? 0.2 : -0.2, 0, -0.45);
      head.add(horn);
    }
  }

  // ── 4 Legs ────────────────────────────────────────────────────────────
  const legDefs = [
    { name: 'fl', x:  0.82, z:  0.46 },
    { name: 'fr', x:  0.82, z: -0.46 },
    { name: 'bl', x: -0.82, z:  0.46 },
    { name: 'br', x: -0.82, z: -0.46 },
  ];
  const legs = {};
  for (const d of legDefs) {
    const pivot = new THREE.Object3D();
    pivot.position.set(d.x, -0.54, d.z); // body-local
    body.add(pivot);

    const upper = mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.56, segs));
    upper.position.y = -0.28;
    pivot.add(upper);

    const knee = new THREE.Object3D();
    knee.position.y = -0.56;
    pivot.add(knee);

    const lower = mesh(new THREE.CylinderGeometry(0.07, 0.065, 0.50, segs));
    lower.position.y = -0.25;
    knee.add(lower);

    const hoof = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.11, 0.21), HOOF_MAT);
    hoof.position.y = -0.55;
    knee.add(hoof);

    legs[d.name] = { pivot, knee };
  }

  // ── Tail ──────────────────────────────────────────────────────────────
  const tailRoot = new THREE.Object3D();
  tailRoot.position.set(-1.22, 0.18, 0);
  body.add(tailRoot);

  for (let i = 0; i < (lod === 'low' ? 1 : 3); i++) {
    const seg = mesh(new THREE.CylinderGeometry(0.025 - i*0.005, 0.038 - i*0.008, 0.32, 4));
    seg.rotation.z = Math.PI / 2;
    seg.position.x = -(0.16 + i * 0.32);
    tailRoot.add(seg);
  }

  // Tail tuft
  const tuft = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 5, 4),
    new THREE.MeshLambertMaterial({ color: 0x1a1a1a })
  );
  tuft.position.x = lod === 'low' ? -0.48 : -1.0;
  tailRoot.add(tuft);

  // ── Udder (high LOD) ──────────────────────────────────────────────────
  let udder = null;
  if (lod === 'high') {
    udder = new THREE.Group();
    udder.position.set(-0.28, -0.58, 0);
    body.add(udder);
    for (const [tx, tz] of [[0.12, 0.12],[0.12,-0.12],[-0.09, 0.12],[-0.09,-0.12]]) {
      const q = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 6, 5),
        new THREE.MeshLambertMaterial({ color: 0xeeb090 })
      );
      q.position.set(tx, 0, tz);
      udder.add(q);
      const teat = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.025, 0.12, 4),
        new THREE.MeshLambertMaterial({ color: 0xe0a07a })
      );
      teat.position.set(tx, -0.1, tz);
      udder.add(teat);
    }
  }

  // Store refs
  root.userData = {
    mat, body, headJoint, neckPivot, tailRoot, legs, lod,
    highOnly: [udder].filter(Boolean),
    medLowHide: [],   // populated below
  };

  // LOD switching: ears/horns are already conditionally built
  return root;
}

// ─── Cow instance ───────────────────────────────────────────────────────────
let cow = buildCow('high');
let currentLOD = 'high';
scene.add(cow);
cow.position.set(0, 0, 0);

// Inverse matrix for the shader — updated each frame
const cowInvMatrix = new THREE.Matrix4();

function syncShaderUniforms() {
  cow.updateMatrixWorld(true);
  cowInvMatrix.copy(cow.matrixWorld).invert();
  // Update all shader material instances in the cow
  cow.traverse(obj => {
    if (obj.isMesh && obj.material && obj.material.uniforms && obj.material.uniforms.uInvCow) {
      obj.material.uniforms.uInvCow.value.copy(cowInvMatrix);
      obj.material.uniforms.tVideo.value = videoTexture;
    }
  });
}

function setLOD(lod) {
  if (lod === currentLOD) return;
  currentLOD = lod;
  document.getElementById('lod-badge').textContent = 'LOD: ' + lod.toUpperCase();
  // Rebuild cow at new LOD
  scene.remove(cow);
  const oldPos = cow.position.clone();
  const oldRotY = cow.rotation.y;
  cow = buildCow(lod);
  cow.position.copy(oldPos);
  cow.rotation.y = oldRotY;
  scene.add(cow);
}

// ─── Pose interpolation ──────────────────────────────────────────────────
let target  = { walkPhase:0, walkSpeed:0, headPitch:0, headYaw:0, bodyYaw:0, animState:'stand' };
let current = { ...target };

function lerpAngle(a, b, t) {
  let d = b - a;
  while (d >  Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return a + d * t;
}

// ─── WebSocket ───────────────────────────────────────────────────────────
let wsDelay = 1000;

function connectWS() {
  const ws = new WebSocket('ws://localhost:8092');
  ws.onopen = () => {
    wsDelay = 1000;
    document.getElementById('s-anim').textContent = 'connected';
    document.getElementById('s-anim').className = 'sv';
  };
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type !== 'pose') return;
      target.walkSpeed  = d.walk_speed   ?? 0;
      target.headPitch  = d.head_pitch   ?? 0;
      target.headYaw    = d.head_yaw     ?? 0;
      target.bodyYaw    = (d.body_yaw    ?? 0) * Math.PI / 180;
      target.animState  = d.animation_state ?? 'stand';
      target.walkPhase  = d.walk_phase   ?? target.walkPhase;

      document.getElementById('s-anim').textContent = target.animState.toUpperCase();
      document.getElementById('s-anim').className = 'sa';
      document.getElementById('s-conf').textContent = (d.confidence ?? 0).toFixed(2);
      document.getElementById('s-spd').textContent  = (d.walk_speed ?? 0).toFixed(2);

      if (d.frame_b64) {
        document.getElementById('video-feed').src = d.frame_b64;
        updateVideoTexture(d.frame_b64);
      }

      const labels = [...(d.concept_labels || [])].slice(0, 8);
      if (labels.length) {
        document.getElementById('labels-box').style.display = 'block';
        document.getElementById('label-list').innerHTML = labels.map(l =>
          `<div class="lbl">${l}</div>`).join('');
      }
      if (d.narrative) {
        document.getElementById('narrative-box').style.display = 'block';
        document.getElementById('narrative-text').textContent = d.narrative;
      }
    } catch (_) {}
  };
  ws.onclose = () => {
    document.getElementById('s-anim').textContent = 'disconnected';
    document.getElementById('s-anim').className = 'sd';
    setTimeout(connectWS, wsDelay);
    wsDelay = Math.min(wsDelay * 1.5, 8000);
  };
  ws.onerror = () => ws.close();
}
connectWS();

// ─── Camera / pointer lock ───────────────────────────────────────────────
let isPointerLocked = false;
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = !!document.pointerLockElement;
  document.getElementById('crosshair').style.display = isPointerLocked ? 'block' : 'none';
  document.getElementById('hint').style.display      = isPointerLocked ? 'none'  : 'block';
});
document.addEventListener('mousemove', e => {
  if (!isPointerLocked) return;
  camYaw   -= e.movementX * 0.0018;
  camPitch  = Math.max(-1.1, Math.min(0.7, camPitch - e.movementY * 0.0018));
});

// ─── FPS / auto-LOD ──────────────────────────────────────────────────────
const fpsWindow = [];
let lastTime = performance.now();
function trackFPS(now) {
  const dt = now - lastTime; lastTime = now;
  fpsWindow.push(1000 / dt);
  if (fpsWindow.length > 90) fpsWindow.shift();
  if (fpsWindow.length < 30) return;
  const avg = fpsWindow.reduce((a, b) => a + b) / fpsWindow.length;
  document.getElementById('s-fps').textContent = avg.toFixed(0);
  if      (avg < 20 && currentLOD !== 'low')  setLOD('low');
  else if (avg < 30 && currentLOD === 'high') setLOD('med');
  else if (avg > 52 && currentLOD !== 'high') setLOD('high');
}

// ─── Cow world position ───────────────────────────────────────────────────
const cowPos  = new THREE.Vector3(0, 0, 0);
let   cowYaw  = 0;
const BOUND   = 50;
const clock   = new THREE.Clock();

// ─── Animation loop ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  trackFPS(performance.now());

  const dt = Math.min(clock.getDelta(), 0.1);
  const t  = clock.elapsedTime;

  // ── Interpolate target → current ──────────────────────────────────────
  const a = 1 - Math.pow(0.04, dt * 6);
  current.walkSpeed = current.walkSpeed + (target.walkSpeed - current.walkSpeed) * a;
  current.headPitch = current.headPitch + (target.headPitch - current.headPitch) * a;
  current.headYaw   = current.headYaw   + (target.headYaw   - current.headYaw)   * a;
  current.bodyYaw   = lerpAngle(current.bodyYaw, target.bodyYaw, a * 0.25);
  current.walkPhase = (current.walkPhase + current.walkSpeed * dt) % (Math.PI * 2);

  const isWalking = target.animState === 'walk';
  const isGrazing = target.animState === 'graze';

  // ── Cow movement ───────────────────────────────────────────────────────
  cowYaw = lerpAngle(cowYaw, current.bodyYaw, a * 0.12);
  if (isWalking) {
    cowPos.x += Math.sin(cowYaw) * current.walkSpeed * 0.025;
    cowPos.z += Math.cos(cowYaw) * current.walkSpeed * 0.025;
  }
  if (Math.abs(cowPos.x) > BOUND || Math.abs(cowPos.z) > BOUND) {
    target.bodyYaw = current.bodyYaw + Math.PI + (Math.random() - 0.5) * 0.8;
  }

  const bounce = isWalking
    ? Math.abs(Math.sin(current.walkPhase * 2)) * 0.03 * Math.min(current.walkSpeed / 3, 1)
    : 0;
  cow.position.set(cowPos.x, bounce, cowPos.z);
  cow.rotation.y = cowYaw + Math.PI;

  // ── Leg animation ──────────────────────────────────────────────────────
  const amp  = Math.min(current.walkSpeed / 2.5, 1.0) * 0.30;
  const p    = current.walkPhase;
  const legs = cow.userData.legs;

  if (legs) {
    legs.fl.pivot.rotation.x = Math.sin(p)           * amp;
    legs.br.pivot.rotation.x = Math.sin(p)           * amp;
    legs.fr.pivot.rotation.x = Math.sin(p + Math.PI) * amp;
    legs.bl.pivot.rotation.x = Math.sin(p + Math.PI) * amp;

    for (const [n, leg] of Object.entries(legs)) {
      const phase = (n === 'fl' || n === 'br') ? p : p + Math.PI;
      leg.knee.rotation.x = Math.max(0, Math.sin(phase)) * amp * 0.7;
    }
  }

  // ── Head movement ──────────────────────────────────────────────────────
  const u = cow.userData;
  if (u.headJoint) {
    u.headJoint.rotation.x = current.headPitch * Math.PI / 180
      + (isWalking ? Math.sin(p) * 0.03 : 0);
    u.headJoint.rotation.y = current.headYaw * Math.PI / 180;
  }

  // ── Tail sway ──────────────────────────────────────────────────────────
  if (u.tailRoot) {
    u.tailRoot.rotation.z = Math.sin(t * 1.7) * 0.20;
    u.tailRoot.rotation.y = Math.sin(t * 0.9) * 0.14;
  }

  // ── Body sway ──────────────────────────────────────────────────────────
  if (u.body) {
    u.body.rotation.z = isWalking ? Math.sin(p * 2) * 0.012 * Math.min(current.walkSpeed / 3, 1) : 0;
  }

  // ── Sync shader uniforms (cow world position changed) ─────────────────
  syncShaderUniforms();

  // ── Background ────────────────────────────────────────────────────────
  updateBackground();

  // ── Camera ────────────────────────────────────────────────────────────
  if (isPointerLocked) {
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? 0.20 : 0.08;
    const dir = new THREE.Vector3(
      (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0),
      0,
      (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0)
    );
    if (dir.lengthSq() > 0) {
      dir.normalize().multiplyScalar(spd).applyEuler(new THREE.Euler(0, camYaw, 0));
      camera.position.add(dir);
    }
    camera.position.y = Math.max(0.3, camera.position.y);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = camYaw;
    camera.rotation.x = camPitch;
  } else {
    // Default: orbit behind & to the side of the cow (matches video angle)
    const dist = 10, height = 2.4;
    const tx = cow.position.x + Math.cos(cowYaw + 1.4) * dist;
    const tz = cow.position.z + Math.sin(cowYaw + 1.4) * dist;
    camera.position.x += (tx - camera.position.x) * 0.035;
    camera.position.y += (height - camera.position.y) * 0.035;
    camera.position.z += (tz - camera.position.z) * 0.035;
    camera.lookAt(cow.position.x, cow.position.y + 1.6, cow.position.z);

    // Sync camYaw to current camera direction for smooth pointer-lock entry
    const dir2 = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    camYaw   = Math.atan2(dir2.x, -dir2.z);
    camPitch = Math.asin(-dir2.y);
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
