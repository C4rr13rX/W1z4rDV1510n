<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W1z4rD V1510n — Neural Cow World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: monospace; }
canvas { display: block; }
#overlay {

}

#labels-box {

</style>
</head>
<body>
<div id="overlay">
  <div id="feed-wrap">
    <img id="video-feed" alt="">
    <div id="feed-label">NEURAL SENSOR FEED</div>
  </div>
  <div id="status-box">
    <span class="sl">STATE </span><span id="s-anim" class="sa">connecting</span><br>
    <span class="sl">COWS  </span><span id="s-cows" class="sv">—</span><br>
    <span class="sl">CONF  </span><span id="s-conf" class="sv">—</span><br>
    <span class="sl">FPS   </span><span id="s-fps"  class="sv">—</span>
  </div>
  <div id="labels-box"><div class="sd">FABRIC CONCEPTS</div><div id="label-list"></div></div>
  <div id="narrative-box"><span id="narrative-text"></span></div>
</div>
<div id="crosshair">+</div>
<div id="hint">Click to enter free-roam · WASD move · Shift sprint · Scroll zoom · Esc exit</div>
<div id="zoom-hint">Scroll to zoom · Left-click entity for labels · Right-click for anatomy</div>
<div id="lod-badge">LOD: —</div>
<div id="hw-badge">GPU: —</div>
<button id="screenshot-btn" onclick="downloadScreenshot()">📷 SCREENSHOT</button>
<div id="entity-panel">
  <span class="ep-close" onclick="closeEntityPanel()">✕</span>
  <div class="ep-title" id="ep-title">Entity</div>
  <div id="ep-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script>
'use strict';

// ─── URL params ────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const SCREENSHOT_MODE = params.has('screenshot');
if (SCREENSHOT_MODE) document.getElementById('screenshot-btn').style.display = 'block';

// ─── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: SCREENSHOT_MODE });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ─── Hardware tier detection ───────────────────────────────────────────────
function detectHardwareTier() {
  const gl = renderer.getContext();
  const info = (gl.getParameter(gl.RENDERER) || '').toLowerCase();
  document.getElementById('hw-badge').textContent = 'GPU: ' + info.slice(0, 28);
  const hi = ['rtx', 'gtx 10', 'gtx 16', 'gtx 9', 'rx ', 'radeon pro', 'apple m', 'tesla', 'quadro'];
  const lo = ['swiftshader', 'llvmpipe', 'intel hd graphics 4', 'intel hd graphics 5', 'mali', 'adreno 3'];
  if (hi.some(k => info.includes(k))) return 'high';
  if (lo.some(k => info.includes(k))) return 'low';
  const c = navigator.hardwareConcurrency || 2;
  return c >= 8 ? 'high' : c >= 4 ? 'med' : 'low';
}

// ─── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x8fafb8, 0.018);

// ─── Camera ────────────────────────────────────────────────────────────────
// Fixed side-view matching the video camera perspective.
// Free-roam via pointer lock overrides this.
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 400);
camera.position.set(14, 2.0, 0);
camera.lookAt(0, 1.2, 0);
camera.rotation.order = 'YXZ';
let camYaw   = Math.atan2(camera.getWorldDirection(new THREE.Vector3()).x,
                           -camera.getWorldDirection(new THREE.Vector3()).z);
let camPitch = 0;

// ─── Shared video texture ──────────────────────────────────────────────────
const videoTexture = new THREE.Texture();
videoTexture.minFilter = THREE.LinearFilter;
videoTexture.magFilter = THREE.LinearFilter;
const videoImg = new Image();
videoImg.onload = () => { videoTexture.image = videoImg; videoTexture.needsUpdate = true; };

function updateVideoTexture(dataURL) { videoImg.src = dataURL; }

// ─── Background plane ─────────────────────────────────────────────────────
const bgGeo = new THREE.PlaneGeometry(1, 1);
const bgMat = new THREE.MeshBasicMaterial({ map: videoTexture, depthWrite: false });
const bgPlane = new THREE.Mesh(bgGeo, bgMat);
bgPlane.renderOrder = -1;
scene.add(bgPlane);

function updateBackground() {
  const dist  = 80;
  const ahead = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  bgPlane.position.copy(camera.position).addScaledVector(ahead, dist);
  bgPlane.lookAt(camera.position);
  const h = 2 * dist * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  bgPlane.scale.set(h * camera.aspect, h, 1);
}

// ─── Lighting ─────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.90));
const sun = new THREE.DirectionalLight(0xfffce0, 0.60);
sun.position.set(20, 40, 10);
scene.add(sun);

// ─── World-space video projection shader ──────────────────────────────────
// Each cow gets its own ShaderMaterial instance with per-cow texture crop.
const cowShader = {
  uniforms: {
    tVideo:     { value: videoTexture },
    uInvCow:    { value: new THREE.Matrix4() },
    uCowMinX:   { value: -1.4 },
    uCowSpanX:  { value:  3.0 },
    uCowMinY:   { value:  0.0 },
    uCowSpanY:  { value:  2.4 },
    uTexOffU:   { value: 0.05 },
    uTexScaleU: { value: 0.90 },
    uTexOffV:   { value: 0.08 },
    uTexScaleV: { value: 0.82 },
    uFallback:  { value: new THREE.Color(0xddd8c8) },
  },
  vertexShader: `
    varying vec4 vWorldPos;
    void main() {
      vWorldPos = modelMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * viewMatrix * vWorldPos;
    }
  `,
  fragmentShader: `
    uniform sampler2D tVideo;
    uniform mat4  uInvCow;
    uniform float uCowMinX, uCowSpanX;
    uniform float uCowMinY, uCowSpanY;
    uniform float uTexOffU, uTexScaleU;
    uniform float uTexOffV, uTexScaleV;
    uniform vec3  uFallback;
    varying vec4 vWorldPos;
    void main() {
      vec3 local = (uInvCow * vWorldPos).xyz;
      float u = (local.x - uCowMinX) / uCowSpanX;
      float v = (local.y - uCowMinY) / uCowSpanY;
      float inBounds = step(0.0, u) * step(u, 1.0) * step(0.0, v) * step(v, 1.0);
      float edgeFade = smoothstep(0.0, 0.05, u) * smoothstep(1.0, 0.95, u)
                     * smoothstep(0.0, 0.04, v) * smoothstep(1.0, 0.96, v);
      float su = uTexOffU + u * uTexScaleU;
      float sv = uTexOffV + v * uTexScaleV;
      vec4 texColor = texture2D(tVideo, vec2(su, sv));
      gl_FragColor  = mix(vec4(uFallback, 1.0), texColor, inBounds * edgeFade);
    }
  `,
};

function makeCowMat() {
  return new THREE.ShaderMaterial({
    uniforms:       THREE.UniformsUtils.clone(cowShader.uniforms),
    vertexShader:   cowShader.vertexShader,
    fragmentShader: cowShader.fragmentShader,
    side:           THREE.DoubleSide,
  });
}

// ─── Helper materials (hooves, pink, eyes) ────────────────────────────────
const HOOF_MAT = new THREE.MeshLambertMaterial({ color: 0x1e0f04 });
const PINK_MAT = new THREE.MeshLambertMaterial({ color: 0xf0a090 });
const EYE_MAT  = new THREE.MeshLambertMaterial({ color: 0x0a0808 });

// ─── Cow builder ──────────────────────────────────────────────────────────
// Stores all ShaderMaterial instances in root.userData.mats for fast uniform update.
function buildCow(lod) {
  const segs = lod === 'low' ? 6 : lod === 'med' ? 10 : 16;
  const root = new THREE.Group();
  const mats = [];

  function mesh(geo) {
    const mat = makeCowMat();
    mats.push(mat);
    const m = new THREE.Mesh(geo, mat);
    return m;
  }

  // Body
  const body = mesh(new THREE.SphereGeometry(1.0, segs * 2, segs));
  body.scale.set(1.28, 0.56, 0.66);
  body.position.y = 1.62;
  root.add(body);

  // Neck pivot (front of body in body-local space)
  const neckPivot = new THREE.Object3D();
  neckPivot.position.set(1.18, 0.20, 0);
  body.add(neckPivot);

  const neck = mesh(new THREE.CylinderGeometry(0.19, 0.26, 0.68, segs));
  neck.rotation.z = -0.52;
  neck.position.set(0.30, 0.18, 0);
  neckPivot.add(neck);

  // Head joint (articulated for head pitch)
  const headJoint = new THREE.Object3D();
  headJoint.position.set(0.54, 0.36, 0);
  neckPivot.add(headJoint);

  const head = mesh(new THREE.SphereGeometry(0.38, segs * 2, segs));
  head.scale.set(1.22, 0.94, 0.88);
  head.position.set(0.30, 0, 0);
  headJoint.add(head);

  // Snout
  const snout = mesh(new THREE.CylinderGeometry(0.19, 0.23, 0.32, segs));
  snout.rotation.z = Math.PI / 2;
  snout.position.set(0.40, -0.04, 0);
  head.add(snout);

  // Nose pad
  const nosePad = new THREE.Mesh(new THREE.CylinderGeometry(0.185, 0.185, 0.025, segs), PINK_MAT);
  nosePad.rotation.z = Math.PI / 2;
  nosePad.position.set(0.165, -0.04, 0);
  snout.add(nosePad);

  for (const z of [0.07, -0.07]) {
    const n = new THREE.Mesh(new THREE.SphereGeometry(0.033, 4, 4), EYE_MAT);
    n.position.set(0.085, -0.04, z);
    snout.add(n);
  }

  if (lod !== 'low') {
    for (const z of [0.30, -0.30]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.070, 7, 7), EYE_MAT);
      eye.position.set(0.20, 0.10, z);
      head.add(eye);
    }
    for (const z of [0.34, -0.34]) {
      const ear = new THREE.Mesh(new THREE.SphereGeometry(0.11, 6, 5), PINK_MAT);
      ear.scale.set(0.5, 1.1, 0.4);
      ear.position.set(-0.14, 0.32, z);
      ear.rotation.z = z > 0 ? 0.28 : -0.28;
      head.add(ear);
    }
  }

  if (lod === 'high') {
    for (const z of [0.24, -0.24]) {
      const horn = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.038, 0.30, 5),
        new THREE.MeshLambertMaterial({ color: 0xd4bc50 })
      );
      horn.position.set(-0.09, 0.40, z);
      horn.rotation.set(z > 0 ? 0.2 : -0.2, 0, -0.44);
      head.add(horn);
    }
  }

  // 4 Legs
  const legDefs = [
    { name: 'fl', x:  0.86, z:  0.44 },
    { name: 'fr', x:  0.86, z: -0.44 },
    { name: 'bl', x: -0.86, z:  0.44 },
    { name: 'br', x: -0.86, z: -0.44 },
  ];
  const legs = {};
  for (const d of legDefs) {
    const pivot = new THREE.Object3D();
    pivot.position.set(d.x, -0.54, d.z);
    body.add(pivot);
    const upper = mesh(new THREE.CylinderGeometry(0.095, 0.082, 0.58, segs));
    upper.position.y = -0.29;
    pivot.add(upper);
    const knee = new THREE.Object3D();
    knee.position.y = -0.58;
    pivot.add(knee);
    const lower = mesh(new THREE.CylinderGeometry(0.072, 0.064, 0.52, segs));
    lower.position.y = -0.26;
    knee.add(lower);
    const hoof = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.22), HOOF_MAT);
    hoof.position.y = -0.57;
    knee.add(hoof);
    legs[d.name] = { pivot, knee };
  }

  // Tail
  const tailRoot = new THREE.Object3D();
  tailRoot.position.set(-1.28, 0.16, 0);
  body.add(tailRoot);
  const tailSegs = lod === 'low' ? 1 : 3;
  for (let i = 0; i < tailSegs; i++) {
    const seg = mesh(new THREE.CylinderGeometry(0.026 - i * 0.005, 0.040 - i * 0.009, 0.33, 4));
    seg.rotation.z = Math.PI / 2;
    seg.position.x = -(0.165 + i * 0.33);
    tailRoot.add(seg);
  }
  const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.092, 5, 4), new THREE.MeshLambertMaterial({ color: 0x181616 }));
  tuft.position.x = lod === 'low' ? -0.50 : -(0.165 + tailSegs * 0.33);
  tailRoot.add(tuft);

  // Udder (high only)
  if (lod === 'high') {
    const udder = new THREE.Group();
    udder.position.set(-0.25, -0.58, 0);
    body.add(udder);
    for (const [tx, tz] of [[0.11, 0.11], [0.11, -0.11], [-0.09, 0.11], [-0.09, -0.11]]) {
      const q = new THREE.Mesh(new THREE.SphereGeometry(0.10, 6, 5),
        new THREE.MeshLambertMaterial({ color: 0xefb898 }));
      q.position.set(tx, 0, tz);
      udder.add(q);
      const teat = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.026, 0.13, 4),
        new THREE.MeshLambertMaterial({ color: 0xe0a07a }));
      teat.position.set(tx, -0.11, tz);
      udder.add(teat);
    }
  }

  root.userData = { mats, body, headJoint, neckPivot, tailRoot, legs, lod };
  return root;
}

// ─── 2-D video position → 3-D world position ─────────────────────────────
// Unprojects through the camera to the ground plane (Y = 0).
// cx, cy are normalised [0,1] in video/image space (Y↓).
function videoToWorldPos(cx, cy, groundY = 0) {
  const ndcX =  cx * 2 - 1;
  const ndcY = -(cy * 2 - 1);
  const v = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
  const dir = v.sub(camera.position).normalize();
  if (Math.abs(dir.y) < 1e-5) {
    return new THREE.Vector3(0, groundY, (cx - 0.5) * 14);
  }
  const t = (groundY - camera.position.y) / dir.y;
  if (t < 0.5) {
    // Ray going away from ground — place at a fixed depth
    return new THREE.Vector3(0, groundY, (cx - 0.5) * 14);
  }
  return camera.position.clone().addScaledVector(dir, t);
}

// ─── Cow registry ─────────────────────────────────────────────────────────
// Map<cowId, { mesh, mats, texOff, cur, target, lastSeen }>
const cowRegistry = new Map();
let currentLOD = 'high';
let globalPose = { walkSpeed: 0, walkPhase: 0, headPitch: 0, headYaw: 0, animState: 'stand' };

function spawnCow(id, worldPos, texOff) {
  const mesh = buildCow(currentLOD);
  mesh.position.copy(worldPos);
  scene.add(mesh);

  // Rotate cow to face camera (roughly along +X from origin)
  mesh.rotation.y = Math.PI;

  cowRegistry.set(id, {
    mesh,
    texOff: { ...texOff },
    cur:  { x: worldPos.x, z: worldPos.z, yaw: Math.PI, walkPhase: 0 },
    target: { x: worldPos.x, z: worldPos.z, yaw: Math.PI,
              walkSpeed: 0, motion: 0, animState: 'stand' },
    lastSeen: performance.now(),
  });
}

function despawnCow(id) {
  const e = cowRegistry.get(id);
  if (e) { scene.remove(e.mesh); cowRegistry.delete(id); }
}

function bboxToTexOff(cx, cy, w, h) {
  const u0 = Math.max(0, cx - w / 2);
  const us  = Math.min(w, 1 - u0);
  // UV V=0 is bottom of image (Three.js default flipY=true)
  const v0 = Math.max(0, 1.0 - cy - h / 2);
  const vs  = Math.min(h, 1 - v0);
  return { u0, us, v0, vs };
}

function syncCowShader(entry) {
  entry.mesh.updateMatrixWorld(true);
  const inv = new THREE.Matrix4().copy(entry.mesh.matrixWorld).invert();
  for (const mat of entry.mesh.userData.mats) {
    const u = mat.uniforms;
    u.uInvCow.value.copy(inv);
    u.tVideo.value    = videoTexture;
    u.uTexOffU.value  = entry.texOff.u0;
    u.uTexScaleU.value = entry.texOff.us;
    u.uTexOffV.value  = entry.texOff.v0;
    u.uTexScaleV.value = entry.texOff.vs;
  }
}

// ─── LOD management ───────────────────────────────────────────────────────
function setLOD(lod) {
  if (lod === currentLOD) return;
  currentLOD = lod;
  document.getElementById('lod-badge').textContent = 'LOD: ' + lod.toUpperCase();
  for (const [id, e] of cowRegistry) {
    const oldPos = e.mesh.position.clone();
    const oldRY  = e.mesh.rotation.y;
    scene.remove(e.mesh);
    const newMesh = buildCow(lod);
    newMesh.position.copy(oldPos);
    newMesh.rotation.y = oldRY;
    scene.add(newMesh);
    e.mesh = newMesh;
  }
}

// ─── WebSocket ────────────────────────────────────────────────────────────
let wsDelay = 1000;
const STALE_MS = 3000;

function connectWS() {
  const ws = new WebSocket('ws://localhost:8092');
  ws.onopen  = () => {
    wsDelay = 1000;
    document.getElementById('s-anim').textContent = 'connected';
    document.getElementById('s-anim').className   = 'sv';
  };
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type !== 'pose') return;

      // Global pose (used for all cows as animation baseline)
      globalPose.walkSpeed  = d.walk_speed   ?? 0;
      globalPose.headPitch  = d.head_pitch   ?? 0;
      globalPose.headYaw    = d.head_yaw     ?? 0;
      globalPose.animState  = d.animation_state ?? 'stand';
      globalPose.walkPhase  = d.walk_phase   ?? globalPose.walkPhase;

      // Update status UI
      document.getElementById('s-anim').textContent = globalPose.animState.toUpperCase();
      document.getElementById('s-anim').className   = 'sa';
      document.getElementById('s-conf').textContent = (d.confidence ?? 0).toFixed(2);
      document.getElementById('s-cows').textContent = (d.cows?.length ?? 0);

      if (d.frame_b64) {
        document.getElementById('video-feed').src = d.frame_b64;
        updateVideoTexture(d.frame_b64);
      }
      if (d.concept_labels?.length) {
        document.getElementById('labels-box').style.display = 'block';
        document.getElementById('label-list').innerHTML = d.concept_labels.slice(0, 8)
          .map(l => `<div class="lbl">${l}</div>`).join('');
      }
      if (d.narrative) {
        document.getElementById('narrative-box').style.display = 'block';
        document.getElementById('narrative-text').textContent = d.narrative;
      }

      // Per-cow update
      const now      = performance.now();
      const incoming = d.cows ?? [];
      const seenIds  = new Set(incoming.map(c => c.id));

      for (const c of incoming) {
        const texOff  = bboxToTexOff(c.cx, c.cy, c.w, c.h);
        const worldPos = videoToWorldPos(c.cx, c.cy);

        if (cowRegistry.has(c.id)) {
          const e = cowRegistry.get(c.id);
          e.target.x         = worldPos.x;
          e.target.z         = worldPos.z;
          e.target.motion    = c.motion ?? 0;
          e.target.walkSpeed = Math.min((c.motion ?? 0) * 5.0, 4.0);
          e.target.animState = (c.motion ?? 0) > 0.10 ? 'walk' : globalPose.animState;
          e.texOff           = texOff;
          e.lastSeen         = now;
          e.conceptLabels    = d.concept_labels || [];
        } else {
          spawnCow(c.id, worldPos, texOff);
          const e = cowRegistry.get(c.id);
          if (e) e.conceptLabels = d.concept_labels || [];
        }
      }

      // Despawn stale cows
      for (const [id, e] of [...cowRegistry]) {
        if (!seenIds.has(id) && (now - e.lastSeen) > STALE_MS) {
          despawnCow(id);
        }
      }

    } catch (_) {}
  };
  ws.onclose = () => {
    document.getElementById('s-anim').textContent = 'disconnected';
    document.getElementById('s-anim').className   = 'sd';
    setTimeout(connectWS, wsDelay);
    wsDelay = Math.min(wsDelay * 1.5, 8000);
  };
  ws.onerror = () => ws.close();
}
connectWS();

// ─── Camera / pointer lock ────────────────────────────────────────────────
let isPointerLocked = false;
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = !!document.pointerLockElement;
  document.getElementById('crosshair').style.display = isPointerLocked ? 'block' : 'none';
  document.getElementById('hint').style.display      = isPointerLocked ? 'none'  : 'block';
  if (isPointerLocked) {
    const d = new THREE.Vector3();
    camera.getWorldDirection(d);
    camYaw   = Math.atan2(d.x, -d.z);
    camPitch = Math.asin(-d.y);
  }
});
document.addEventListener('mousemove', e => {
  if (!isPointerLocked) return;
  camYaw   -= e.movementX * 0.0018;
  camPitch  = Math.max(-1.1, Math.min(0.7, camPitch - e.movementY * 0.0018));
});

// ─── FPS / auto-LOD ──────────────────────────────────────────────────────
const fpsWindow = [];
let lastTime = performance.now();
function trackFPS(now) {
  const dt = now - lastTime; lastTime = now;
  if (dt < 1) return;
  fpsWindow.push(1000 / dt);
  if (fpsWindow.length > 90) fpsWindow.shift();
  if (fpsWindow.length < 30) return;
  const avg = fpsWindow.reduce((a, b) => a + b) / fpsWindow.length;
  document.getElementById('s-fps').textContent = avg.toFixed(0);
  if      (avg < 18 && currentLOD !== 'low')  setLOD('low');
  else if (avg < 28 && currentLOD === 'high') setLOD('med');
  else if (avg > 55 && currentLOD !== 'high') setLOD('high');
}

// ─── Lerpings ─────────────────────────────────────────────────────────────
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d >  Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return a + d * t;
}

// ─── Cinematic camera — tracks herd centroid along Z, respects zoom ──────
const CINEMATIC_Y = 2.0;
let cinemaCentroidZ = 0;

function updateCinematicCamera(dt) {
  let sumZ = 0, n = 0;
  for (const [, e] of cowRegistry) { sumZ += e.cur.z; n++; }
  const targetZ = n > 0 ? sumZ / n : 0;
  cinemaCentroidZ += (targetZ - cinemaCentroidZ) * Math.min(dt * 1.2, 1);

  camera.position.set(zoomDist, CINEMATIC_Y * (zoomDist / 14), cinemaCentroidZ);
  camera.lookAt(0, 1.2, cinemaCentroidZ);

  const d2 = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  camYaw   = Math.atan2(d2.x, -d2.z);
  camPitch = Math.asin(-d2.y);
}

// ─── Per-cow animation ────────────────────────────────────────────────────
const clock = new THREE.Clock();
const TMP_INV = new THREE.Matrix4();

function animateCowEntry(entry, dt, t) {
  const a = 1 - Math.pow(0.04, dt * 5);
  entry.cur.x = entry.cur.x + (entry.target.x - entry.cur.x) * a;
  entry.cur.z = entry.cur.z + (entry.target.z - entry.cur.z) * a;

  const walkSpeed = entry.target.walkSpeed > 0.1
    ? entry.target.walkSpeed
    : globalPose.walkSpeed;
  entry.cur.walkPhase = (entry.cur.walkPhase + walkSpeed * dt) % (Math.PI * 2);

  const anim    = entry.target.animState || globalPose.animState;
  const isWalk  = anim === 'walk';
  const isGraze = anim === 'graze';
  const bounce  = isWalk
    ? Math.abs(Math.sin(entry.cur.walkPhase * 2)) * 0.025 * Math.min(walkSpeed / 3, 1)
    : 0;

  entry.mesh.position.set(entry.cur.x, bounce, entry.cur.z);

  const u = entry.mesh.userData;

  // Legs
  const amp  = Math.min(walkSpeed / 2.5, 1.0) * 0.30;
  const p    = entry.cur.walkPhase;
  if (u.legs) {
    u.legs.fl.pivot.rotation.x = Math.sin(p)           * amp;
    u.legs.br.pivot.rotation.x = Math.sin(p)           * amp;
    u.legs.fr.pivot.rotation.x = Math.sin(p + Math.PI) * amp;
    u.legs.bl.pivot.rotation.x = Math.sin(p + Math.PI) * amp;
    for (const [n, leg] of Object.entries(u.legs)) {
      const ph = (n === 'fl' || n === 'br') ? p : p + Math.PI;
      leg.knee.rotation.x = Math.max(0, Math.sin(ph)) * amp * 0.65;
    }
  }

  // Head
  const headPitch = isGraze ? -22 : (walkSpeed > 0.5 ? -5 : globalPose.headPitch);
  if (u.headJoint) {
    u.headJoint.rotation.x = headPitch * Math.PI / 180
      + (isWalk ? Math.sin(p) * 0.028 : 0);
    u.headJoint.rotation.y = globalPose.headYaw * Math.PI / 180;
  }

  // Tail sway
  if (u.tailRoot) {
    u.tailRoot.rotation.z = Math.sin(t * 1.7 + entry.cur.z * 0.5) * 0.20;
    u.tailRoot.rotation.y = Math.sin(t * 0.9 + entry.cur.z * 0.3) * 0.14;
  }

  // Body sway
  if (u.body) {
    u.body.rotation.z = isWalk
      ? Math.sin(p * 2) * 0.010 * Math.min(walkSpeed / 3, 1) : 0;
  }

  syncCowShader(entry);
}

// ─── Raycaster + interaction ──────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2d   = new THREE.Vector2();

// Collect all mesh children of a cow group into a flat list for raycasting
function cowMeshObjects() {
  const objs = [];
  for (const [id, e] of cowRegistry) {
    e.mesh.traverse(o => { if (o.isMesh) objs.push({ mesh: o, id }); });
  }
  return objs;
}

function pickEntity(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse2d.x =  ((event.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse2d.y = -((event.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);

  const candidates = cowMeshObjects();
  const meshes     = candidates.map(c => c.mesh);
  const hits       = raycaster.intersectObjects(meshes, false);
  if (!hits.length) return null;

  const hitMesh = hits[0].object;
  const found   = candidates.find(c => c.mesh === hitMesh);
  return found ? found.id : null;
}

function showEntityPanel(id) {
  const e = cowRegistry.get(id);
  if (!e) return;
  const labels = e.conceptLabels || [];
  const motion = (e.target.motion || 0).toFixed(2);
  const anim   = e.target.animState || 'stand';
  document.getElementById('ep-title').textContent =
    `Entity #${id}  [${anim.toUpperCase()}]`;
  document.getElementById('ep-content').innerHTML =
    `<div style="color:#888;margin-bottom:4px">motion: ${motion}</div>` +
    (labels.length
      ? labels.map(l => `<div class="ep-label">◈ ${l}</div>`).join('')
      : '<div style="color:#444">No neural labels yet — train to activate</div>');
  document.getElementById('entity-panel').style.display = 'block';
}

function closeEntityPanel() {
  document.getElementById('entity-panel').style.display = 'none';
}

// Left-click: select entity → show neural label panel
renderer.domElement.addEventListener('click', e => {
  if (isPointerLocked) return;  // pointer-lock handles movement
  const id = pickEntity(e);
  if (id !== null) {
    showEntityPanel(id);
  } else {
    closeEntityPanel();
    renderer.domElement.requestPointerLock();
  }
});

// Right-click: show anatomy view (toggle internal neural-label overlay)
renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (isPointerLocked) return;
  const id = pickEntity(e);
  if (id !== null) showEntityPanel(id);
});

// Mouse wheel: zoom in/out (move cinematic camera toward/away from centroid)
let zoomDist = 14;  // matches CINEMATIC_X
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  zoomDist = Math.max(4, Math.min(50, zoomDist + e.deltaY * 0.015));
}, { passive: false });

// Override CINEMATIC_X usage to use zoomDist
// (patch updateCinematicCamera below to use zoomDist instead of literal 14)

// ─── Screenshot capture ───────────────────────────────────────────────────
function downloadScreenshot() {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  const a   = document.createElement('a');
  a.href    = url;
  a.download = `cow_world_${Date.now()}.png`;
  a.click();
}

// Expose capture for Playwright
window.__captureFrame = function() {
  renderer.render(scene, camera);
  return renderer.domElement.toDataURL('image/png');
};

window.__getCowCount  = function() { return cowRegistry.size; };
window.__getFrameData = function() {
  const feed = document.getElementById('video-feed');
  return feed.src || null;
};

// ─── Animation loop ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  trackFPS(performance.now());

  const dt = Math.min(clock.getDelta(), 0.1);
  const t  = clock.elapsedTime;

  // Animate all registered cows
  for (const [, entry] of cowRegistry) {
    animateCowEntry(entry, dt, t);
  }

  // Camera
  if (isPointerLocked) {
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? 0.22 : 0.09;
    const dir = new THREE.Vector3(
      (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0),
      0,
      (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0)
    );
    if (dir.lengthSq() > 0) {
      dir.normalize().multiplyScalar(spd).applyEuler(new THREE.Euler(0, camYaw, 0));
      camera.position.add(dir);
    }
    camera.position.y = Math.max(0.2, camera.position.y);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = camYaw;
    camera.rotation.x = camPitch;
  } else {
    updateCinematicCamera(dt);
  }

  updateBackground();
  renderer.render(scene, camera);
}

// ─── Init hardware tier → LOD ─────────────────────────────────────────────
(function init() {
  const tier = detectHardwareTier();
  currentLOD = tier;
  document.getElementById('lod-badge').textContent = 'LOD: ' + tier.toUpperCase();
  animate();
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
