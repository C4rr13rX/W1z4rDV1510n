# W1z4rD V1510n supervisor overrides.
# See supervisor.toml.example for the full list of keys + defaults.

[node]
# Bumped from 3s/3 misses. With drive_corpora + the bash curriculum
# both hammering /sensor/observe, node /health latency can briefly
# spike past 3s even though the node is fine. A false-positive node
# kill wipes the in-memory motif fabric — losing hours of training.
#
# Production brain.bin is now 11+ GB after months of training;
# the merged node binary's startup deserialisation routinely runs
# 4-7 minutes during which /health hasn't bound the listener yet.
# 60 misses × 10s = 600 s of grace before the supervisor reaches
# for the kill switch.  warmup_secs is the post-relaunch quiet
# period the supervisor waits BEFORE counting misses — bumped to
# 600 s for the same reason.  Without these values, the supervisor
# was killing the binary mid-deserialise every 70 s and never
# letting the load finish.  Tune DOWN once we land an mmap-backed
# brain.bin format that doesn't need a full read at startup.
health_timeout = 10.0
# 180 misses × 10 s = 30 min of grace before the supervisor reaches
# for the kill switch.  Empirical: 11 GB brain.bin + 870 MB WAL
# replay regularly takes 12-15 min wall clock; the previous 600 s
# value still triggered a false-positive kill mid-load.
health_misses_before_restart = 180
# 30 min initial warmup window before health probes count toward
# misses.  Without this, the supervisor was killing the binary mid-
# deserialise every ~10 min, never letting it finish.
warmup_secs = 1800.0

[django]
# Use the SPA root, NOT /api/wizard-chat/status/. The status endpoint
# fans out to the node's /health + /brain, which under training load
# can take 4-6s — pushing past the watchdog timeout and triggering
# false-positive restarts (which then spawn a fresh CoolCryptoUtilities
# console every cycle). The SPA root is served by whitenoise from the
# Vue dist bundle and answers in <10 ms regardless of node state, so
# it cleanly measures only Django liveness.
health_url = "http://127.0.0.1:8000/"
health_timeout = 10.0
health_misses_before_restart = 5

[training]
# Disable the legacy bash curriculum.  It uses `word_*` labels (in
# violation of feedback_no_predefined_neurons) and competes for the
# node's inner lock with drive_corpora, slowing every /sensor/observe
# call by 10-50x.  drive_corpora is now the canonical text trainer
# (see tools/training_standard/drive_corpora.py).  Set to true to
# re-enable; the script still works for its non-text phases (Stage 0
# toddler, k12, etc) but isn't doing useful work for the current
# text-only curriculum.
enabled = false
# 8 threads was the smoking gun for the "Django takes long to load
# then quietly crashes" pattern: the SPA's parallel polls + each
# Django request blocking on the node's inner lock saturated waitress
# and the task queue piled up >16 deep before the panel went dark.
# 24 covers the worst observed concurrency comfortably.
threads = 24
