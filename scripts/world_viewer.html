<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W1z4rD V1510n — Neural World Viewer</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { position:absolute; inset:0; z-index:1; display:block; }

/* Crosshair (FPS mode only) */
#xhair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:16px; height:16px; z-index:5; pointer-events:none; display:none; }
#xhair::before,#xhair::after { content:''; position:absolute; background:rgba(120,220,200,0.7); }
#xhair::before { width:1px; height:100%; left:50%; top:0; }
#xhair::after  { width:100%; height:1px; top:50%; left:0; }

/* Top-left: title + stream state */
#hud-tl { position:absolute; top:14px; left:14px; z-index:5; pointer-events:none; }
#hud-tl .title { font-size:9px; letter-spacing:3px; color:#1a6a8a; text-transform:uppercase; margin-bottom:5px; }
#stream-dot { display:inline-block; width:5px; height:5px; border-radius:50%;
  background:#1a2a38; margin-right:5px; vertical-align:middle; }
#stream-txt { font-size:8px; color:#1a3a4a; letter-spacing:1.5px; }
#entity-count { font-size:8px; color:#0d2030; letter-spacing:1px; margin-top:3px; }

/* Left panel: active networks */
#fire-panel { position:absolute; top:60px; left:14px; z-index:5; pointer-events:none;
  min-width:180px; }
#fire-panel .ph { font-size:7px; letter-spacing:2px; color:#0d2030; text-transform:uppercase;
  margin-bottom:5px; border-bottom:1px solid #061018; padding-bottom:3px; }
.fire-row { display:flex; align-items:center; gap:5px; margin:2px 0; }
.fire-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
.fire-lbl { color:#1a4a5a; font-size:8px; }
.fire-str { color:#0d2a38; font-size:7.5px; margin-left:auto; }
.fire-wm  { color:#2a8a50; font-size:7px; }
.fire-srp { color:#b04020; font-size:7px; }

/* Right panel: nearest entity */
#ent-panel { position:absolute; top:14px; right:14px; width:240px; z-index:5;
  background:rgba(2,6,14,0.90); border:1px solid #0a1826; border-top:2px solid #1a5870;
  border-radius:3px; padding:10px 12px; font-size:9px; pointer-events:none; }
#ent-panel .ph { font-size:7px; letter-spacing:2px; color:#0d2838; text-transform:uppercase;
  margin-bottom:7px; border-bottom:1px solid #061018; padding-bottom:4px; }
#ent-name { font-size:12px; color:#6ab8d8; margin-bottom:2px; }
#ent-sub  { font-size:8px; color:#1a4a60; font-style:italic; margin-bottom:5px; }
.ekv { display:flex; justify-content:space-between; margin:1.5px 0; }
.ekv .k { color:#0d2030; font-size:8px; text-transform:uppercase; }
.ekv .v { color:#2a6070; font-size:8px; }

/* Bottom: controls */
#controls-bar { position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:8px; color:rgba(25,70,95,0.7); letter-spacing:2px; text-transform:uppercase;
  z-index:5; pointer-events:none; text-align:center; white-space:nowrap; }

/* FPS toggle button */
#fps-btn { position:absolute; bottom:14px; right:14px; z-index:5;
  background:none; border:1px solid #0a2030; color:#1a4050; padding:6px 14px;

/* Fade */

<script type="module">
import * as THREE from 'three';
import { OrbitControls }      from 'three/addons/controls/OrbitControls.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer }      from 'three/addons/postprocessing/EffectComposer.js';

import { UnrealBloomPass }     from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }          from 'three/addons/postprocessing/OutputPass.js';

const HOST        = '192.168.1.84:8090';
const WORLD_SCALE = 28;
const BASE_SPD    = 7.0;
const INSPECT_DIST= 3.5;

// ── Per-label visual config ───────────────────────────────────────────────────
const LCONF = {
  chloroplast:           { col:0x00e060, em:0x005830, h:1.0, sc:0.7,  sub:'Chloroplastum' },
  mitochondria:          { col:0xb020ff, em:0x701090, h:0.7, sc:0.45, sub:'Mitochondrium' },

  endoplasmic_reticulum: { col:0xf0d000, em:0x807000, h:0.7, sc:0.55, sub:'Reticulum endoplasmicum' },

  microtubule_track:     { col:0x00d5f0, em:0x006880, h:0.5, sc:0.25, sub:'Microtubulus' },
  vesicle:               { col:0xff80c0, em:0x983060, h:0.5, sc:0.22, sub:'Vesicula' },
  nucleolus:             { col:0x5090ff, em:0x284890, h:1.4, sc:0.4,  sub:'Nucleolus' },
  centrosome:            { col:0xff4040, em:0xa02020, h:1.1, sc:0.3,  sub:'Centrosome' },
  cow_body:              { col:0xa05020, em:0x602010, h:1.8, sc:2.0,  sub:'Bovine corpus' },
  cow_head:              { col:0x904018, em:0x581008, h:2.5, sc:1.0,  sub:'Caput bovinum' },
  cow_leg:               { col:0x805018, em:0x501008, h:0.5, sc:0.3,  sub:'Crus bovinum' },
  cow_eye:               { col:0x202020, em:0x181818, h:2.6, sc:0.1,  sub:'Oculus bovinum' },
  grass:                 { col:0x30a830, em:0x185818, h:0.2, sc:0.35, sub:'Gramen' },
  tree:                  { col:0x208820, em:0x104410, h:3.5, sc:1.4,  sub:'Arbor' },
  sky:                   { col:0x2060c0, em:0x103060, h:9.0, sc:3.5,  sub:'Caelum' },
  ground:                { col:0x3a6020, em:0x1c3010, h:0.05,sc:5.0,  sub:'Terra' },
  bird:                  { col:0x304060, em:0x182030, h:5.0, sc:0.15, sub:'Avis' },
  default:               { col:0x4070a0, em:0x203850, h:0.6, sc:0.5,  sub:'Unknown label' },
};
function lconf(lbl) {
  const l = lbl.toLowerCase();
  for (const [k, v] of Object.entries(LCONF)) {
    if (l.includes(k)) return v;
  }
  return LCONF.default;
}
function colHex(col) { return '#' + col.toString(16).padStart(6,'0'); }

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping  = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010810);
scene.fog = new THREE.FogExp2(0x020c18, 0.018);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.05, 400);
camera.position.set(0, 4, 18);
camera.lookAt(0, 1, 0);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.3, 0.70, 0.04);
composer.addPass(bloom);
composer.addPass(new OutputPass());

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.AmbientLight(0x0a1828, 1.5));
const kl1 = new THREE.DirectionalLight(0x3060a0, 1.5); kl1.position.set(5, 20, 8); scene.add(kl1);
const kl2 = new THREE.PointLight(0x204060, 8.0, 80);  kl2.position.set(0, 15, 0);  scene.add(kl2);
const kl3 = new THREE.PointLight(0x1a3050, 4.0, 40);  kl3.position.set(-10, 5, -10); scene.add(kl3);

// ── Environment ───────────────────────────────────────────────────────────────
// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200, 1, 1),
  new THREE.MeshStandardMaterial({ color:0x060e18, roughness:1 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Grid
const grid = new THREE.GridHelper(160, 100, 0x0a2030, 0x061018);
grid.position.y = 0.01;
scene.add(grid);

// Horizon ring glow
const ringGeo = new THREE.TorusGeometry(50, 0.08, 4, 80);
const ringMat = new THREE.MeshBasicMaterial({ color:0x1a4060, transparent:true, opacity:0.3 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI/2; ring.position.y = 0.5;
scene.add(ring);

// Ambient particle field
{
  const g = new THREE.BufferGeometry();
  const v = new Float32Array(2400);
  for (let i = 0; i < 2400; i += 3) {
    v[i]   = (Math.random() - 0.5) * 160;
    v[i+1] = Math.random() * 30;
    v[i+2] = (Math.random() - 0.5) * 160;
  }
  g.setAttribute('position', new THREE.BufferAttribute(v, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color:0x2a5070, size:0.06, transparent:true, opacity:0.7 })));
}

// Vertical axis marker at origin
{
  const axGeo = new THREE.CylinderGeometry(0.03, 0.03, 10, 6);
  const axMat = new THREE.MeshBasicMaterial({ color:0x1a4060, transparent:true, opacity:0.4 });
  scene.add(new THREE.Mesh(axGeo, axMat));
}

// Offline message sprite (shown when stream is offline)
const offlineSprite = (() => {
  const cv = document.createElement('canvas'); cv.width = 640; cv.height = 80;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'rgba(2,8,20,0.9)'; ctx.fillRect(0,0,640,80);
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1; ctx.strokeRect(0.5,0.5,639,79);
  ctx.font = '18px Courier New'; ctx.fillStyle = '#2a6a8a';
  ctx.fillText('NEURAL STREAM OFFLINE — START NODE + STREAM SCRIPT', 12, 30);
  ctx.font = '13px Courier New'; ctx.fillStyle = '#1a3a50';
  ctx.fillText('python3 scripts/stream_cell_activity.py  OR  stream_video_sim.py', 12, 56);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false }));
  sp.scale.set(12, 1.5, 1);
  sp.position.set(0, 3.5, 0);
  scene.add(sp);
  return sp;
})();

// ── Controls — OrbitControls (default, works immediately) ────────────────────
const orbitCtrl = new OrbitControls(camera, canvas);
orbitCtrl.enableDamping   = true;
orbitCtrl.dampingFactor   = 0.07;
orbitCtrl.minDistance     = 2;
orbitCtrl.maxDistance     = 80;
orbitCtrl.target.set(0, 1, 0);
orbitCtrl.autoRotate      = true;
orbitCtrl.autoRotateSpeed = 0.3;

// ── PointerLock (optional FPS mode) ──────────────────────────────────────────
const plc = new PointerLockControls(camera, document.body);
let fpsMode = false;

plc.addEventListener('lock', () => {
  fpsMode = true;
  orbitCtrl.enabled = false;
  document.getElementById('fps-btn').classList.add('active');
  document.getElementById('fps-btn').textContent = 'EXIT FPS';
  document.getElementById('xhair').style.display = 'block';
  document.getElementById('controls-bar').textContent = 'WASD · MOVE  |  SPACE/CTRL · UP/DOWN  |  SHIFT · RUN  |  E · INSPECT  |  ESC · EXIT FPS';
});
plc.addEventListener('unlock', () => {
  fpsMode = false;
  orbitCtrl.enabled = true;
  document.getElementById('fps-btn').classList.remove('active');
  document.getElementById('fps-btn').textContent = 'FPS MODE';
  document.getElementById('xhair').style.display = 'none';
  document.getElementById('controls-bar').textContent = 'DRAG · ORBIT  |  SCROLL · ZOOM  |  WASD · STRAFE  |  E · INSPECT NEAREST';
  // Restore orbit camera to current camera state
  orbitCtrl.target.set(
    camera.position.x + Math.sin(camera.rotation.y),
    camera.position.y,
    camera.position.z + Math.cos(camera.rotation.y) * -1,
  );
  orbitCtrl.update();
});

window.toggleFPS = () => {
  if (fpsMode) plc.unlock();
  else         plc.lock();
};

// Movement state
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });
const vel = new THREE.Vector3();

// ── Neural stream ─────────────────────────────────────────────────────────────
let neuroSnap  = null;
let streamOk   = false;
let frameCount = 0;

const dot = document.getElementById('stream-dot');
const stxt = document.getElementById('stream-txt');

function startStream() {
  const es = new EventSource(`http://${HOST}/neuro/stream`);
  es.addEventListener('snap', ev => {
    try {
      neuroSnap  = JSON.parse(ev.data);
      streamOk   = true;
      frameCount++;
      dot.style.background  = '#2ab080';
      stxt.style.color      = '#2a8060';
      stxt.textContent      = `STREAM LIVE — ${frameCount} FRAMES`;
      offlineSprite.material.opacity = 0;
    } catch {}
  });
  es.onerror = () => {
    streamOk = false;
    dot.style.background = '#8a3020';
    stxt.style.color     = '#6a2018';
    stxt.textContent     = 'STREAM OFFLINE';
    offlineSprite.material.opacity = 0.9;
  };
}
startStream();

// ── Entity management ─────────────────────────────────────────────────────────
const entities = {};

class NeuralEntity {
  constructor(id, label) {
    this.id       = id;
    this.label    = label;
    this.cfg      = lconf(label);
    this.pos      = new THREE.Vector3(0, this.cfg.h, 0);
    this.targetP  = this.pos.clone();
    this.strength = 0;
    this.inWM     = false;
    this.surprise = 0;
    this.age      = 0;
    this._labelDirty = true;

    // Core sphere
    this.mat = new THREE.MeshPhysicalMaterial({
      color:            this.cfg.col,
      emissive:         this.cfg.em,
      emissiveIntensity:0.6,
      roughness: 0.25,
      metalness: 0.1,
      transparent: true,
      opacity: 0.0,
    });
    this.mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), this.mat);
    this.mesh.scale.setScalar(0.001);
    scene.add(this.mesh);

    // Soft shell
    this.shellMat = new THREE.MeshBasicMaterial({
      color: this.cfg.col, transparent: true, opacity: 0.0, side: THREE.BackSide,
    });
    this.shell = new THREE.Mesh(new THREE.SphereGeometry(1.22, 10, 8), this.shellMat);
    this.shell.scale.setScalar(0.001);
    scene.add(this.shell);

    // Billboard label
    this.labelCv  = document.createElement('canvas');
    this.labelCv.width = 512; this.labelCv.height = 72;
    this.labelCtx = this.labelCv.getContext('2d');
    this.labelTex = new THREE.CanvasTexture(this.labelCv);
    this.sprite   = new THREE.Sprite(new THREE.SpriteMaterial({
      map: this.labelTex, transparent: true, depthWrite: false,
    }));
    this.sprite.scale.set(3.2, 0.45, 1);
    scene.add(this.sprite);

    this._drawLabel();
  }

  _drawLabel() {
    const ctx = this.labelCtx;
    const W = 512, H = 72;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(1,4,12,0.88)'; ctx.fillRect(0, 0, W, H);
    const borderCol = colHex(this.cfg.col);
    ctx.strokeStyle = borderCol + '55'; ctx.lineWidth = 1; ctx.strokeRect(0.5, 0.5, W-1, H-1);
    ctx.font = 'bold 18px Courier New';
    ctx.fillStyle = borderCol;
    const displayName = this.label.replace(/_/g,' ').toUpperCase().slice(0, 30);
    ctx.fillText(displayName, 10, 24);
    ctx.font = '13px Courier New';
    ctx.fillStyle = '#2a5a6a';
    ctx.fillText(this.cfg.sub, 10, 44);
    ctx.font = '11px Courier New';
    ctx.fillStyle = '#1a3040';
    const s = (this.strength * 100).toFixed(0);
    ctx.fillText(`STR:${s}%  WM:${this.inWM?'YES':'–'}  SRP:${(this.surprise*100).toFixed(0)}%`, 10, 62);
    this.labelTex.needsUpdate = true;
    this._labelDirty = false;
  }

  update(dt, targetPos, strength, inWM, surprise) {
    this.age += dt;
    const changed = strength !== this.strength || inWM !== this.inWM;
    this.strength = strength; this.inWM = inWM; this.surprise = surprise;
    if (changed && this.age > 0.5) this._labelDirty = true;
    if (this._labelDirty && this.age % 2 < dt * 2) this._drawLabel(); // throttle redraws

    if (targetPos) this.targetP.copy(targetPos);
    this.pos.lerp(this.targetP, dt * 2.8);

    const baseSc  = this.cfg.sc * (0.6 + strength * 1.4 + (inWM ? 0.5 : 0));
    const clampSc = Math.max(0.001, Math.min(baseSc, this.cfg.sc * 4));
    const curSc   = this.mesh.scale.x;
    const newSc   = THREE.MathUtils.lerp(curSc, clampSc, dt * 3.5);
    this.mesh.scale.setScalar(newSc);
    this.shell.scale.setScalar(newSc);
    this.mesh.position.copy(this.pos);
    this.shell.position.copy(this.pos);
    this.sprite.position.set(this.pos.x, this.pos.y + newSc + 0.6, this.pos.z);

    // Opacity fade-in
    const targetOp = Math.min(0.80 + strength * 0.2, 0.95);
    this.mat.opacity      = THREE.MathUtils.lerp(this.mat.opacity, targetOp, dt * 2.5);
    this.shellMat.opacity = this.mat.opacity * 0.18;
    this.sprite.material.opacity = Math.min(this.mat.opacity * 1.2, 1.0);

    // Emissive
    const baseEI  = 0.4 + strength * 2.2 + (inWM ? 1.0 : 0);
    const flashEI = surprise > 0.65 ? Math.abs(Math.sin(Date.now() * 0.009)) * 2.5 : 0;
    this.mat.emissiveIntensity = THREE.MathUtils.lerp(this.mat.emissiveIntensity, baseEI + flashEI, dt * 5);
  }

  dispose() {
    scene.remove(this.mesh);  this.mesh.geometry.dispose();  this.mat.dispose();
    scene.remove(this.shell); this.shell.geometry.dispose(); this.shellMat.dispose();
    scene.remove(this.sprite); this.sprite.material.dispose(); this.labelTex.dispose();
  }
}

// ── Network links pool ────────────────────────────────────────────────────────
const MAX_LINKS = 150;
const linkLines = [];
for (let i = 0; i < MAX_LINKS; i++) {
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const mat = new THREE.LineBasicMaterial({ color:0x1a4a5a, transparent:true, opacity:0 });
  const ln  = new THREE.Line(geo, mat);
  scene.add(ln);
  linkLines.push({ ln, geo, mat });
}

function updateLinks(snap) {
  const links = snap.network_links || {};
  let li = 0;
  outer: for (const [a, conns] of Object.entries(links)) {
    const ea = entities[a]; if (!ea) continue;
    for (const [b, w] of Object.entries(conns)) {
      if (w < 0.22 || li >= MAX_LINKS) continue outer;
      const eb = entities[b]; if (!eb) continue;
      const L = linkLines[li];
      const pos = L.geo.attributes.position;
      pos.setXYZ(0, ea.pos.x, ea.pos.y, ea.pos.z);
      pos.setXYZ(1, eb.pos.x, eb.pos.y, eb.pos.z);
      pos.needsUpdate = true;
      L.mat.opacity = w * 0.35;
      li++;
    }
  }
  for (let i = li; i < MAX_LINKS; i++) linkLines[i].mat.opacity = 0;
}

// ── Update world from neural snapshot ────────────────────────────────────────
function updateWorld(snap) {
  const centroids = snap.centroids || {};
  const wm        = new Set(snap.working_memory || []);
  const surp      = snap.surprise || {};
  const netStr    = {};
  (snap.active_networks || []).forEach(n => {
    const s = n.strength || 0;
    (n.members || []).forEach(m => { netStr[m] = Math.max(netStr[m] || 0, s); });
  });

  // Create / update entities
  for (const [lbl, pos] of Object.entries(centroids)) {
    const cfg = lconf(lbl);
    const wp  = new THREE.Vector3(
      (pos.x - 0.5) * WORLD_SCALE,
      cfg.h,
      (pos.y - 0.5) * WORLD_SCALE
    );
    if (!entities[lbl]) {
      const e = new NeuralEntity(lbl, lbl);
      e.pos.copy(wp); e.targetP.copy(wp);
      entities[lbl] = e;
    }
    entities[lbl]._tgt  = wp;
    entities[lbl]._str  = netStr[lbl] || 0;
    entities[lbl]._inWM = wm.has(lbl);
    entities[lbl]._srp  = surp[lbl] || 0;
  }

  // Fade out stale
  for (const [id, ent] of Object.entries(entities)) {
    if (!centroids[id]) {
      ent._str = Math.max(0, (ent._str || 0) - 0.02);
      if ((ent._str || 0) <= 0 && ent.age > 5) {
        ent.dispose(); delete entities[id];
      }
    }
  }

  updateLinks(snap);
  updateFireList(netStr, wm, surp);
  document.getElementById('entity-count').textContent = `${Object.keys(entities).length} entities`;
}

// ── Fire list ─────────────────────────────────────────────────────────────────
function updateFireList(netStr, wm, surp) {
  const sorted = Object.entries(netStr).sort((a,b)=>b[1]-a[1]).slice(0,12);
  document.getElementById('fire-list').innerHTML = sorted.length
    ? sorted.map(([lbl,s]) => {
        const c = colHex(lconf(lbl).col);
        return `<div class="fire-row">
          <div class="fire-dot" style="background:${c}"></div>
          <span class="fire-lbl">${lbl.replace(/_/g,' ').slice(0,20)}</span>
          ${wm.has(lbl) ? '<span class="fire-wm">●WM</span>' : ''}
          ${(surp[lbl]||0)>0.6 ? '<span class="fire-srp">⚡</span>' : ''}
          <span class="fire-str">${(s*100).toFixed(0)}%</span>
        </div>`;
      }).join('')
    : '<div style="font-size:8px;color:#0d1820">— awaiting stream —</div>';
}

// ── Nearest entity + proximity indicator ─────────────────────────────────────
let nearestEnt = null;
const proxLabel = document.getElementById('prox-label');

function updateNearest() {
  let minD = Infinity, nearest = null;
  for (const ent of Object.values(entities)) {
    const d = camera.position.distanceTo(ent.pos);
    if (d < minD) { minD = d; nearest = ent; }
  }
  nearestEnt = nearest;
  const isClose = nearest && minD < INSPECT_DIST + nearest.cfg.sc * 2;
  const alpha = isClose ? Math.max(0, 1 - minD / (INSPECT_DIST + nearest.cfg.sc * 2)) : 0;
  proxLabel.style.color = `rgba(40,180,120,${alpha})`;
  proxLabel.textContent = isClose
    ? `PRESS E — ${nearest.label.replace(/_/g,' ').toUpperCase()}`
    : 'PRESS E TO INSPECT';

  if (nearest) {
    document.getElementById('ent-name').textContent = nearest.label.replace(/_/g,' ').toUpperCase();
    document.getElementById('ent-sub').textContent  = nearest.cfg.sub;
    document.getElementById('ent-kvs').innerHTML = [
      ['Distance', minD.toFixed(1) + ' units'],
      ['Strength', ((nearest._str||0)*100).toFixed(1) + '%'],
      ['Working Mem', nearest._inWM ? 'YES' : 'no'],
      ['Surprise',  ((nearest._srp||0)*100).toFixed(1) + '%'],
      ['Age', nearest.age.toFixed(0) + ' s'],
    ].map(([k,v]) => `<div class="ekv"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
  }
}

// ── E key: inspect ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'KeyE' && nearestEnt) {
    const cellTypes = ['chloroplast','mitochondria','nucleus','ribosome','vacuole','golgi','endoplasmic','thylakoid','lipid'];
    if (cellTypes.some(t => nearestEnt.label.includes(t))) {
      const fd = document.getElementById('fade');
      fd.style.opacity = '1';
      setTimeout(() => { window.open('cell_viewer.html','_blank'); fd.style.opacity='0'; }, 400);
    }
  }
  // Auto-rotate off when user moves
  if (['KeyW','KeyA','KeyS','KeyD'].includes(e.code)) orbitCtrl.autoRotate = false;
});

// ── Clock + animation ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameN = 0;

// Progress bar for initial load feedback
const prog = document.getElementById('loading-prog');
let loadPct = 0;
const loadIntvl = setInterval(() => {
  loadPct = Math.min(loadPct + 8, 90);
  prog.style.width = loadPct + '%';
  if (loadPct >= 90) {
    clearInterval(loadIntvl);
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 600);
    prog.style.width = '100%';
  }
}, 200);

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  frameN++;

  // FPS movement
  if (fpsMode) {
    const speed = BASE_SPD * (keys['ShiftLeft'] || keys['ShiftRight'] ? 2.5 : 1.0);
    const fwd   = Number(keys['KeyW'] || keys['ArrowUp'])    - Number(keys['KeyS'] || keys['ArrowDown']);
    const right = Number(keys['KeyD'] || keys['ArrowRight']) - Number(keys['KeyA'] || keys['ArrowLeft']);
    const up    = Number(keys['Space']) - Number(keys['ControlLeft'] || keys['ControlRight']);
    vel.z -= fwd   * speed * dt * 10;
    vel.x -= right * speed * dt * 10;
    const drag = Math.exp(-9 * dt);
    vel.x *= drag; vel.z *= drag;
    plc.moveForward(-vel.z * dt);
    plc.moveRight(-vel.x * dt);
    camera.position.y += up * speed * dt;
    camera.position.y = Math.max(0.5, Math.min(40, camera.position.y));
  } else {
    // WASD strafe in orbit mode
    if (keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD']) {
      const spd = 0.08;
      if (keys['KeyW']) orbitCtrl.target.z -= spd;
      if (keys['KeyS']) orbitCtrl.target.z += spd;
      if (keys['KeyA']) orbitCtrl.target.x -= spd;
      if (keys['KeyD']) orbitCtrl.target.x += spd;
    }
    orbitCtrl.update();
  }

  // Update world from neural stream
  if (neuroSnap) updateWorld(neuroSnap);

  // Animate each entity
  for (const ent of Object.values(entities)) {
    ent.update(dt, ent._tgt, ent._str || 0, ent._inWM || false, ent._srp || 0);
  }

  // Nearest entity check (every 8 frames)
  if (frameN % 8 === 0) updateNearest();

  composer.render();
}

animate();
</script>
