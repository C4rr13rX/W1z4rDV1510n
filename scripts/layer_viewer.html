<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W1z4rD V1510n — Layered Physiology Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace;
         display: flex; height: 100vh; overflow: hidden; }

  #canvas-container { flex: 1; position: relative; }
  #renderer-canvas  { display: block; width: 100%; height: 100%; }

  #sidebar {
    width: 320px; background: #111118; border-left: 1px solid #2a2a4a;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 12px 16px; background: #16161f; border-bottom: 1px solid #2a2a4a;
    font-size: 11px; color: #7070a0; letter-spacing: 1px; text-transform: uppercase;
  }
  #sidebar-header h2 { font-size: 13px; color: #a0c0ff; margin-bottom: 4px; }

  #controls {
    padding: 12px 16px; border-bottom: 1px solid #2a2a4a;
    display: flex; flex-direction: column; gap: 10px;
  }
  .ctrl-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .ctrl-label { width: 80px; color: #7070a0; flex-shrink: 0; }
  input[type="range"] {
    flex: 1; appearance: none; height: 4px; background: #2a2a4a;
    border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #4080ff; cursor: pointer;
  }
  input[type="text"] {
    flex: 1; background: #1a1a2e; border: 1px solid #3a3a5a; color: #e0e0e0;
    padding: 4px 8px; font-family: inherit; font-size: 12px; border-radius: 3px;
  }
  button {
    background: #1e2a4a; border: 1px solid #3a5aaa; color: #a0c0ff;
    padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer;
    border-radius: 3px; letter-spacing: 0.5px;
  }
  button:hover { background: #2a3a6a; }

  #info-panel { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 12px; }
  #info-panel h3 { color: #6090d0; font-size: 11px; margin: 10px 0 4px;
                   letter-spacing: 1px; text-transform: uppercase; }
  .entity-block { margin-bottom: 14px; border-bottom: 1px solid #1a1a2a; padding-bottom: 10px; }
  .entity-id { color: #80d0a0; font-size: 13px; font-weight: bold; }
  .layer-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; cursor: pointer;
               padding: 2px 4px; border-radius: 2px; }
  .layer-row:hover { background: #1a2a3a; }
  .layer-row.selected { background: #1a3050; }
  .depth-badge {
    width: 20px; height: 20px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 9px; font-weight: bold;
    flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);
  }
  .layer-name { flex: 1; color: #c0c0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-z { color: #7070a0; font-size: 10px; white-space: nowrap; }

  #poetry-box {
    background: #0d0d1a; border: 1px solid #2a2a4a; padding: 10px;
    margin: 8px 0; font-size: 11px; color: #9090b0; line-height: 1.6;
    border-radius: 3px;
  }

  #status-bar {
    padding: 6px 16px; font-size: 10px; color: #5060a0;
    border-top: 1px solid #1a1a2a; background: #0d0d18;
    display: flex; justify-content: space-between;
  }
  #status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
                background: #20a040; margin-right: 4px; }

  .tooltip {
    position: absolute; background: rgba(10,10,20,0.95); border: 1px solid #3a4a6a;
    padding: 6px 10px; font-size: 11px; pointer-events: none;
    border-radius: 3px; max-width: 200px; z-index: 10;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="renderer-canvas"></canvas>
  <div id="tooltip" class="tooltip" style="display:none"></div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>W1z4rD V1510n</h2>
    Layered Physiology — 3D Explorer
  </div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Entity</span>
      <input type="text" id="entity-input" value="game_console" placeholder="entity id">
      <button onclick="refresh()">↺</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Depth</span>
      <input type="range" id="depth-slider" min="0" max="5" step="1" value="5"
             oninput="onDepthChange(this.value)">
      <span id="depth-label" style="font-size:11px;color:#a0a0c0;width:20px;text-align:right">5</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Opacity</span>
      <input type="range" id="opacity-slider" min="0.05" max="0.7" step="0.05" value="0.22"
             oninput="onOpacityChange(this.value)">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Explode</span>
      <input type="range" id="explode-slider" min="0" max="3" step="0.1" value="0"
             oninput="onExplodeChange(this.value)">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Host</span>
      <input type="text" id="host-input" value="192.168.1.84:8090" style="font-size:11px">
    </div>
    <div class="ctrl-row" style="gap:6px">
      <button onclick="togglePoll()">⏸ Pause</button>
      <button onclick="calibrateDialog()">⚡ Calibrate</button>
      <button onclick="exportScene()">↓ JSON</button>
    </div>
  </div>

  <div id="info-panel">
    <div id="entity-info">Loading...</div>
    <h3>Scientific Poetry</h3>
    <div id="poetry-box">—</div>
    <h3>Scale Profile</h3>
    <div id="scale-info" style="font-size:11px;color:#6070a0;line-height:1.8">—</div>
  </div>

  <div id="status-bar">
    <span><span id="status-dot"></span><span id="status-text">idle</span></span>
    <span id="last-update">—</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('renderer-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a0f, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.001, 100);
camera.position.set(0, 0.5, 3.5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 15;

// Ambient + point light.
scene.add(new THREE.AmbientLight(0x303050, 2));
const pLight = new THREE.PointLight(0x6080ff, 3, 10);
pLight.position.set(2, 2, 2);
scene.add(pLight);

// Grid plane.
const grid = new THREE.GridHelper(8, 20, 0x1a1a3a, 0x12122a);
grid.position.y = -1.2;
scene.add(grid);

// ── State ────────────────────────────────────────────────────────────────────
let meshes      = [];
let layerData   = [];
let currentDepth = 5;
let globalOpacity = 0.22;
let explodeFactor = 0;
let polling     = true;
let pollTimer   = null;
let lastReport  = null;

// Depth → color (outer=dark, inner=bright).
const DEPTH_COLORS = [
  0x334455,  // 0 — surface (dark teal)
  0x2255aa,  // 1 — subsystem (blue)
  0x22aa66,  // 2 — cellular/circuit (green)
  0xaaaa22,  // 3 — molecular (yellow)
  0xdd6622,  // 4 — atomic (orange)
  0xff3388,  // 5 — quantum (pink)
];

function depthColor(d) {
  return DEPTH_COLORS[d] || 0x888888;
}

// ── Build 3D scene from report ───────────────────────────────────────────────
function buildScene(report) {
  // Clear old meshes.
  meshes.forEach(m => scene.remove(m));
  meshes = [];
  layerData = [];

  if (!report || !report.layers || report.layers.length === 0) return;

  const layers = report.layers.filter(l => l.depth <= currentDepth);

  // Base sphere radius = entity size, shrinks with depth.
  const maxLayers = report.max_depth || 5;

  layers.forEach((layer, i) => {
    const d = layer.depth;
    // Radius: outer layers are larger.
    const radiusFrac = 1.0 - (d / (maxLayers + 1)) * 0.75;
    const r = 0.9 * radiusFrac;

    const geo  = new THREE.SphereGeometry(r, 48, 32);
    const mat  = new THREE.MeshPhongMaterial({
      color:       depthColor(d),
      transparent: true,
      opacity:     globalOpacity * (0.7 + d * 0.08),
      wireframe:   false,
      side:        THREE.DoubleSide,
      depthWrite:  false,
    });
    const mesh = new THREE.Mesh(geo, mat);

    // Explode: shift each layer outward along its z direction.
    const z_raw = layer.position.z_est_m || 0;
    const zNorm = Math.log10(1 + z_raw * 1e6) / 6; // log-scale normalisation
    mesh.position.set(0, 0, explodeFactor * (d / maxLayers) * -1.5);

    // Confidence → emissive glow.
    const conf = layer.position.z_confidence || 0;
    mat.emissive = new THREE.Color(depthColor(d)).multiplyScalar(0.1 + conf * 0.25);

    scene.add(mesh);
    meshes.push(mesh);
    layerData.push({ mesh, layer, radius: r });

    // Wireframe overlay for depth hint.
    if (d === currentDepth) {
      const wMat = new THREE.MeshBasicMaterial({
        color: 0xffffff, wireframe: true, transparent: true, opacity: 0.08
      });
      const wMesh = new THREE.Mesh(new THREE.SphereGeometry(r * 1.002, 24, 16), wMat);
      wMesh.position.copy(mesh.position);
      scene.add(wMesh);
      meshes.push(wMesh);
    }
  });

  // Axis label lines.
  addAxisLabels(report);
}

function addAxisLabels(report) {
  // X-axis guide.
  const mats = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.4 });
  const pts  = [new THREE.Vector3(-1.2, 0, 0), new THREE.Vector3(1.2, 0, 0)];
  const geo  = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, mats);
  scene.add(line);
  meshes.push(line);
}

// ── Poll API ─────────────────────────────────────────────────────────────────
async function fetchLayers() {
  const host   = document.getElementById('host-input').value.trim();
  const entity = document.getElementById('entity-input').value.trim() || 'game_console';
  const url    = `http://${host}/overlay/layers/${encodeURIComponent(entity)}?depth=${currentDepth}`;
  const url2   = `http://${host}/overlay/poetry`;

  setStatus('fetching', '#aa8820');
  try {
    const [layersRes, poetryRes] = await Promise.all([
      fetch(url).then(r => r.json()),
      fetch(url2).then(r => r.json()).catch(() => null),
    ]);

    lastReport = layersRes;
    buildScene(layersRes);
    updateSidebar(layersRes, poetryRes, entity);
    setStatus('live', '#20a040');
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
  } catch (e) {
    setStatus('error', '#a04020');
    console.error(e);
  }
}

function setStatus(text, color) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = color;
}

function updateSidebar(report, poetry, entityId) {
  const infoEl = document.getElementById('entity-info');
  if (!report || !report.layers) {
    infoEl.innerHTML = `<div style="color:#a05050">No data for "${entityId}"</div>`;
    return;
  }

  const layers = report.layers;
  let html = `<div class="entity-block">`;
  html += `<div class="entity-id">${report.entity_id}</div>`;
  html += `<div style="font-size:10px;color:#5060a0;margin:3px 0">
    ${layers.length} layers  ·  max_depth=${report.max_depth}  ·  components=${report.total_components}
  </div>`;

  layers.forEach((l, i) => {
    const col = `#${depthColor(l.depth).toString(16).padStart(6,'0')}`;
    const zStr = formatZ(l.position.z_est_m);
    const conf = (l.position.z_confidence * 100).toFixed(0);
    const eem  = l.position.z_from_eem ? '⚡' : '';
    html += `<div class="layer-row" id="lr-${i}" onclick="selectLayer(${i})">
      <div class="depth-badge" style="background:${col}20;border-color:${col};color:${col}">
        ${l.depth}
      </div>
      <div class="layer-name" title="${l.label}">${l.label}</div>
      <div class="layer-z">${eem}${zStr} (${conf}%)</div>
    </div>`;
  });
  html += `</div>`;
  infoEl.innerHTML = html;

  // Scale profile.
  const sp = report.scale_profile || {};
  const scaleParts = (sp.z_metres || []).map((v, i) =>
    `<span style="color:${v ? '#80c080' : '#404060'}">D${i}:${v ? formatZ(v) : '?'}</span>`
  ).join('  ');
  document.getElementById('scale-info').innerHTML =
    `calibrated: <b style="color:${sp.calibrated ? '#80d080' : '#707090'}">${sp.calibrated}</b>
     eem_eqs: ${sp.eem_equation_count || 0}  weight: ${(sp.eem_total_weight || 0).toFixed(2)}<br>
     ${scaleParts}`;

  // Poetry.
  const poetryEl = document.getElementById('poetry-box');
  if (poetry && poetry.entities && poetry.entities.length > 0) {
    const p = poetry.entities[0];
    poetryEl.textContent = p.synthesis || '—';
  } else if (poetry && poetry.synthesis) {
    poetryEl.textContent = poetry.synthesis;
  } else {
    // Build minimal poetry from layer data.
    const topLabels = layers.slice(0,3).map(l => l.label.replace(/^txt:|img:/,'')).join(', ');
    poetryEl.textContent = `${entityId}: ${layers.length} structural layers identified. ` +
      `Surface to depth-${report.max_depth}. ` +
      (topLabels ? `Characterized by: ${topLabels}.` : '');
  }
}

window.selectLayer = function(idx) {
  document.querySelectorAll('.layer-row').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(`lr-${idx}`);
  if (el) el.classList.add('selected');
  if (layerData[idx]) {
    const { mesh } = layerData[idx];
    // Highlight selected sphere.
    layerData.forEach(({ mesh: m }, i) => {
      m.material.opacity = i === idx ? 0.6 : globalOpacity * (0.7 + layerData[i].layer.depth * 0.08);
    });
  }
};

function formatZ(v) {
  if (!v && v !== 0) return '?';
  if (v < 1e-9)  return `${(v*1e12).toFixed(1)} pm`;
  if (v < 1e-6)  return `${(v*1e9).toFixed(1)} nm`;
  if (v < 1e-3)  return `${(v*1e6).toFixed(1)} µm`;
  if (v < 1)     return `${(v*1e3).toFixed(1)} mm`;
  return `${v.toFixed(3)} m`;
}

// ── Controls callbacks ────────────────────────────────────────────────────────
window.onDepthChange = function(val) {
  currentDepth = parseInt(val);
  document.getElementById('depth-label').textContent = currentDepth;
  if (lastReport) buildScene(lastReport);
};

window.onOpacityChange = function(val) {
  globalOpacity = parseFloat(val);
  layerData.forEach(({ mesh, layer }) => {
    mesh.material.opacity = globalOpacity * (0.7 + layer.depth * 0.08);
  });
};

window.onExplodeChange = function(val) {
  explodeFactor = parseFloat(val);
  if (lastReport) buildScene(lastReport);
};

window.refresh = fetchLayers;

window.togglePoll = function() {
  polling = !polling;
  document.querySelector('button[onclick="togglePoll()"]').textContent =
    polling ? '⏸ Pause' : '▶ Resume';
  if (polling) schedulePoll();
};

window.calibrateDialog = function() {
  const host = document.getElementById('host-input').value.trim();
  const type = prompt('Entity type (e.g. "game_console", "cell"):');
  if (!type) return;
  const scale = parseFloat(prompt('Known physical size in metres (e.g. 0.30 for 30cm):'));
  if (!scale || isNaN(scale)) return;
  fetch(`http://${host}/overlay/layers/calibrate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ entity_type: type, known_scale_m: scale })
  }).then(r => r.json()).then(d => {
    alert(`Calibrated: ${type} = ${scale} m\n${JSON.stringify(d)}`);
    fetchLayers();
  });
};

window.exportScene = function() {
  if (!lastReport) return;
  const blob = new Blob([JSON.stringify(lastReport, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `layers_${lastReport.entity_id}_${Date.now()}.json`;
  a.click();
};

// ── Raycasting for hover tooltip ─────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2    = new THREE.Vector2();
const tooltip   = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse2.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse2.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse2, camera);
  const sphereMeshes = layerData.map(d => d.mesh);
  const hits = raycaster.intersectObjects(sphereMeshes);

  if (hits.length > 0) {
    const hitMesh = hits[hits.length - 1].object; // innermost hit
    const idx = layerData.findIndex(d => d.mesh === hitMesh);
    if (idx >= 0) {
      const l = layerData[idx].layer;
      tooltip.style.display = 'block';
      tooltip.style.left    = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top     = (e.clientY - rect.top  + 12) + 'px';
      tooltip.innerHTML = `<b>Depth ${l.depth}</b><br>${l.label}<br>` +
        `z = ${formatZ(l.position.z_est_m)}<br>` +
        `prob = ${(l.probability * 100).toFixed(0)}%<br>` +
        (l.components.length ? `sub: ${l.components.slice(0,3).join(', ')}` : '');
      canvas.style.cursor = 'crosshair';
    }
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

// ── Render loop ───────────────────────────────────────────────────────────────
function resize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

function animate() {
  requestAnimationFrame(animate);
  resize();
  controls.update();
  // Slow rotation when not interacting.
  if (!controls.isDragging) {
    scene.rotation.y += 0.0008;
  }
  renderer.render(scene, camera);
}

function schedulePoll() {
  if (pollTimer) clearTimeout(pollTimer);
  if (polling) pollTimer = setTimeout(async () => {
    await fetchLayers();
    schedulePoll();
  }, 2000);
}

animate();
fetchLayers();
schedulePoll();

// Keyboard depth navigation (← → keys).
document.addEventListener('keydown', (e) => {
  const slider = document.getElementById('depth-slider');
  if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
    slider.value = Math.max(0, currentDepth - 1);
    window.onDepthChange(slider.value);
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
    slider.value = Math.min(5, currentDepth + 1);
    window.onDepthChange(slider.value);
  }
});
</script>
</body>
</html>
