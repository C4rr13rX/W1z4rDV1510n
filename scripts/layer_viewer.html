<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W1z4rD V1510n — Layered Physiology Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #d0d0e8; font-family: 'Courier New', monospace;
         display: flex; height: 100vh; overflow: hidden; }

  /* ── Canvas ─────────────────────────────────────────────────────── */
  #canvas-wrap { flex: 1; position: relative; }
  canvas       { display: block; width: 100%; height: 100%; }

  /* ── Sidebar ─────────────────────────────────────────────────────── */
  #sidebar {
    width: 310px; background: #0d0d18; border-left: 1px solid #1e2040;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  #sb-header {
    padding: 10px 14px 8px; background: #12121e; border-bottom: 1px solid #1e2040;
  }
  #sb-header h2 { font-size: 12px; color: #7090d0; letter-spacing: 2px; text-transform: uppercase; }
  #sb-header .subtitle { font-size: 10px; color: #404060; margin-top: 2px; }

  /* ── Controls block ──────────────────────────────────────────────── */
  #controls { padding: 10px 14px; border-bottom: 1px solid #161630; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 11px; }
  .lbl { width: 68px; color: #5060a0; flex-shrink: 0; font-size: 10px; text-transform: uppercase; }

  select, input[type="text"] {
    flex: 1; background: #13131f; border: 1px solid #2a2a44; color: #c0c8f0;
    padding: 4px 7px; font-family: inherit; font-size: 11px; border-radius: 3px;
    outline: none;
  }
  select:focus, input:focus { border-color: #404880; }

  input[type="range"] {
    flex: 1; -webkit-appearance: none; height: 3px; background: #1e2040;
    border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #4060cc; cursor: pointer;
  }
  .range-val { width: 40px; text-align: right; font-size: 10px; color: #6070a0; flex-shrink: 0; }

  .btn-row { display: flex; gap: 6px; margin-top: 2px; }
  button {
    flex: 1; background: #161630; border: 1px solid #2a2a50; color: #8090c0;
    padding: 5px 8px; font-family: inherit; font-size: 10px; cursor: pointer;
    border-radius: 3px; letter-spacing: 0.5px; text-transform: uppercase;
    transition: background 0.15s;
  }
  button:hover { background: #1e2048; color: #a0b0d8; }
  button.active { background: #1a3060; border-color: #3050a0; color: #80b0ff; }

  /* ── Info panel ──────────────────────────────────────────────────── */
  #info { flex: 1; overflow-y: auto; padding: 10px 14px; scrollbar-width: thin;
          scrollbar-color: #1e2040 transparent; }
  #info::-webkit-scrollbar { width: 4px; }
  #info::-webkit-scrollbar-thumb { background: #1e2040; }

  .section-title {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: #3a4060; margin: 10px 0 5px; border-bottom: 1px solid #13131f;
    padding-bottom: 3px;
  }

  /* Layer list */
  .layer-item {
    display: flex; align-items: center; gap: 7px; padding: 4px 6px;
    border-radius: 3px; cursor: pointer; margin: 2px 0;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .layer-item:hover   { background: #131328; border-color: #1e2040; }
  .layer-item.sel     { background: #101a30; border-color: #2040a0; }
  .layer-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .layer-label { flex: 1; font-size: 11px; color: #a0a8d0; overflow: hidden;
                 text-overflow: ellipsis; white-space: nowrap; }
  .layer-meta  { font-size: 9px; color: #4050a0; text-align: right; line-height: 1.5; }

  /* Poetry box */
  #poetry {
    background: #0b0b17; border: 1px solid #1a1a30; padding: 8px 10px;
    font-size: 10px; color: #7080a8; line-height: 1.7; border-radius: 3px;
    min-height: 50px;
  }

  /* Scale profile */
  #scale-profile { font-size: 10px; color: #4050a0; line-height: 2; }
  .scale-row { display: flex; align-items: center; gap: 6px; }
  .scale-bar { flex: 1; height: 3px; background: #1a1a30; border-radius: 1px; }
  .scale-fill { height: 100%; border-radius: 1px; }
  .scale-z { width: 60px; text-align: right; color: #5060a0; }

  /* Status bar */
  #statusbar {
    padding: 5px 14px; font-size: 9px; color: #3a4060; border-top: 1px solid #131325;
    display: flex; justify-content: space-between; background: #0a0a14;
  }
  #statusdot { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
               background: #204040; margin-right: 5px; transition: background 0.3s; }

  /* Tooltip */
  #tip {
    position: absolute; background: rgba(8,8,20,0.97); border: 1px solid #2a3060;
    padding: 6px 10px; font-size: 10px; pointer-events: none; border-radius: 3px;
    max-width: 220px; z-index: 10; display: none; line-height: 1.6;
  }
  #tip b { color: #8090d0; }

  /* Layer "x-ray" indicator overlay on canvas */
  #depth-label-overlay {
    position: absolute; top: 14px; left: 14px; font-size: 11px;
    color: rgba(100,120,200,0.7); pointer-events: none; letter-spacing: 1px;
  }
</style>

    <span><span id="statusdot"></span><span id="statustext">idle</span></span>

// ═══════════════════════════════════════════════════════════════════
// Depth colors — outermost (0) dark, innermost (5) bright
// ═══════════════════════════════════════════════════════════════════
const DEPTH_HEX = [
  '#1a2233',  // 0 surface   (very dark)
  '#1a3a6a',  // 1 subsystem (navy)
  '#1a6a4a',  // 2 cellular  (dark green)
  '#6a6a1a',  // 3 molecular (amber)
  '#8a3010',  // 4 atomic    (dark orange)
  '#8a1050',  // 5 quantum   (deep pink)
];
const DEPTH_BRIGHT = [
  '#3a5588', '#2a65bb', '#22a86a', '#c8b822', '#e8501c', '#e81870',
];

function hexToThree(h) {
  return new THREE.Color(h);
}

// ═══════════════════════════════════════════════════════════════════
// Scene setup
// ═══════════════════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x080810, 1);
renderer.shadowMap.enabled = false;
renderer.localClippingEnabled = true;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.0001, 100);
camera.position.set(0, 0.4, 4.0);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.minDistance      = 0.3;
controls.maxDistance      = 18;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.4;

// Lights
const ambLight = new THREE.AmbientLight(0x202840, 3.0);
scene.add(ambLight);
const ptLight = new THREE.PointLight(0x5070d0, 6, 15);
ptLight.position.set(2.5, 2, 2);
scene.add(ptLight);
const ptLight2 = new THREE.PointLight(0xd05030, 2, 10);
ptLight2.position.set(-2, -1, -2);
scene.add(ptLight2);

// Grid
const grid = new THREE.GridHelper(10, 24, 0x12122a, 0x0e0e1e);
grid.position.y = -1.6;
scene.add(grid);

// ═══════════════════════════════════════════════════════════════════
// Clipping plane (cross-section)
// ═══════════════════════════════════════════════════════════════════
const clipPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 1.2);
let   clipActive = false;

// ═══════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════
let meshes       = [];     // { mesh, layer, radius }
let lastReport   = null;
let currentEntity = 'game_console';
let currentDepth = 5;
let globalOpacity = 0.22;
let explodeFactor = 0;
let selectedIdx  = -1;
let polling      = true;
let pollTimer    = null;
let userInteracting = false;
const dragStart  = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => {
  dragStart.x = e.clientX; dragStart.y = e.clientY;
  userInteracting = true;
  controls.autoRotate = false;
});
canvas.addEventListener('mouseup', () => {
  userInteracting = false;
  // Re-enable auto-rotate only when not hovering a sphere
});

// ═══════════════════════════════════════════════════════════════════
// Build scene from a LayeredPhysiologyReport
// ═══════════════════════════════════════════════════════════════════
function buildScene(report) {
  meshes.forEach(({ mesh }) => scene.remove(mesh));
  meshes = [];
  if (!report || !report.layers || !report.layers.length) return;

  const layers = report.layers.filter(l => l.depth <= currentDepth);
  const maxD   = report.max_depth || 5;

  // Sort by depth descending so outer spheres render first (correct transparency).
  layers.sort((a, b) => b.depth - a.depth);

  layers.forEach((layer, i) => {
    const d = layer.depth;
    // Outer = large, inner = small.
    const rFrac = 1.0 - (d / (maxD + 1)) * 0.78;
    const r     = 1.05 * rFrac;

    const geo = new THREE.SphereGeometry(r, 64, 40);
    const col = hexToThree(DEPTH_HEX[d] || '#222244');
    const mat = new THREE.MeshPhongMaterial({
      color:       col,
      emissive:    hexToThree(DEPTH_HEX[d]).multiplyScalar(0.25),
      transparent: true,
      opacity:     globalOpacity,
      side:        THREE.DoubleSide,
      depthWrite:  false,
      clippingPlanes: clipActive ? [clipPlane] : [],
    });

    const mesh = new THREE.Mesh(geo, mat);

    // Explode: push each layer radially along Z.
    const explodeZ = explodeFactor * (d / Math.max(maxD, 1)) * -2.2;
    mesh.position.set(0, 0, explodeZ);

    scene.add(mesh);
    meshes.push({ mesh, layer, radius: r, depth: d });
  });

  // Wireframe on innermost currently-visible layer.
  if (layers.length > 0) {
    const inner = layers.reduce((a, b) => a.depth > b.depth ? a : b);
    const wr    = meshes.find(({ layer }) => layer === inner);
    if (wr) {
      const wMat = new THREE.MeshBasicMaterial({
        color: 0xffffff, wireframe: true, transparent: true, opacity: 0.05,
        clippingPlanes: clipActive ? [clipPlane] : [],
      });
      const wMesh = new THREE.Mesh(
        new THREE.SphereGeometry(wr.radius * 1.003, 24, 16), wMat
      );
      wMesh.position.copy(wr.mesh.position);
      scene.add(wMesh);
      meshes.push({ mesh: wMesh, layer: inner, radius: wr.radius, depth: inner.depth, _wire: true });
    }
  }

  // Depth overlay label.
  const visDepths = [...new Set(layers.map(l => l.depth))].sort();
  document.getElementById('depth-label-overlay').textContent =
    `DEPTHS ${visDepths.join(' · ')}`;
}

// ═══════════════════════════════════════════════════════════════════
// API calls
// ═══════════════════════════════════════════════════════════════════
async function fetchLayers() {
  const host    = document.getElementById('host-in').value.trim();
  const profile = PROFILES[currentEntity] || PROFILES.game_console;
  setStatus('fetch', '#9a7a10');

  // If custom entity, read labels from text box.
  let labels;
  if (currentEntity === 'custom') {
    const raw = document.getElementById('custom-labels').value;
    labels = raw.split(',').map(s => s.trim()).filter(Boolean)
              .map((name, i, arr) => ({ name, score: 1 - i / arr.length }));
  } else {
    labels = profile.labels;
  }
  if (!labels.length) {
    setStatus('no labels', '#602020'); return;
  }

  const active_labels  = labels.map(l => l.name);
  const label_scores   = Object.fromEntries(labels.map(l => [l.name, l.score]));

  const body = {
    entities: [{
      entity_id:     currentEntity,
      phenotype:     currentEntity,
      active_labels,
      label_scores,
      x_frac:        0.5,
      y_frac:        0.5,
      size_est:      profile.known_scale_m || 0.1,
    }]
  };

  try {
    const res = await fetch(`http://${host}/overlay/layers`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const report = data.layers?.[0];
    if (!report) throw new Error('empty response');

    lastReport = report;
    buildScene(report);
    updateSidebar(report);
    setStatus('live', '#208040');
    document.getElementById('statustime').textContent = new Date().toLocaleTimeString();
  } catch (e) {
    setStatus(`error: ${e.message}`, '#902020');
  }
}

// Ensure calibrations are registered when switching entity.
async function ensureCalibrated(entityId) {
  const host    = document.getElementById('host-in').value.trim();
  const profile = PROFILES[entityId];
  if (!profile || !profile.known_scale_m) return;
  try {
    await fetch(`http://${host}/overlay/layers/calibrate`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ entity_type: entityId, known_scale_m: profile.known_scale_m }),
    });
  } catch (_) {}
}

// ═══════════════════════════════════════════════════════════════════
// Sidebar update
// ═══════════════════════════════════════════════════════════════════
function fmtZ(v) {
  if (!v && v !== 0) return '?';
  if (v === 0)      return '0';
  if (v < 1e-12)    return `${(v*1e15).toPrecision(3)} fm`;
  if (v < 1e-9)     return `${(v*1e12).toPrecision(3)} pm`;
  if (v < 1e-6)     return `${(v*1e9).toPrecision(3)} nm`;
  if (v < 1e-3)     return `${(v*1e6).toPrecision(3)} µm`;
  if (v < 1)        return `${(v*1e3).toPrecision(3)} mm`;
  return `${v.toPrecision(3)} m`;
}

function updateSidebar(report) {
  // Layer list.
  const ll = document.getElementById('layer-list');
  const layers = report.layers.slice().sort((a, b) => a.depth - b.depth);
  if (!layers.length) { ll.innerHTML = '<span style="color:#3040a0">no layers at this depth</span>'; return; }

  ll.innerHTML = layers.map((l, i) => {
    const col    = DEPTH_BRIGHT[l.depth] || '#888';
    const eem    = l.position.z_from_eem ? ' ⚡' : '';
    const conf   = (l.position.z_confidence * 100).toFixed(0);
    const zStr   = fmtZ(l.position.z_est_m);
    const label  = l.label.replace(/^txt:\w+_|^img:/g, '').replace(/_zone.*$/,'');
    const subs   = l.components.slice(0, 4)
                    .map(c => c.replace(/^txt:\w+_|^img:/g,'').replace(/_zone.*$/,''))
                    .join(', ');
    return `<div class="layer-item" id="li-${i}" onclick="selLayer(${i})">
      <div class="layer-dot" style="background:${col}40;border-color:${col}"></div>
      <div class="layer-label" title="${l.label}">D${l.depth}: ${label}</div>
      <div class="layer-meta">${zStr}${eem}<br>${conf}% conf</div>
    </div>
    ${subs ? `<div style="font-size:9px;color:#303060;padding:0 0 3px 26px">${subs}</div>` : ''}`;
  }).join('');

  // Build scientific synthesis from layer data.
  const topLabels = layers.slice(0, 3).map(l =>
    l.label.replace(/^txt:\w+_|^img:/g,'').replace(/_zone.*$/,'')
  );
  const sp = report.scale_profile;
  const scaleSrc = sp.eem_equation_count > 0
    ? `EEM-calibrated (${sp.eem_equation_count} eqs, weight ${sp.eem_total_weight.toFixed(2)})`
    : sp.calibrated ? 'explicit calibration' : 'linear heuristic';

  document.getElementById('poetry').textContent =
    `${report.entity_id}: ${layers.length} structural depth layers resolved from learned labels.\n` +
    `Surface → depth ${report.max_depth}. Characterized by ${topLabels.join(', ')}.\n` +
    `Z-axis: ${scaleSrc}. Total ${report.total_components} sub-components.`;

  // Scale profile bars.
  const z_metres = sp.z_metres || [];
  const zMax = z_metres.reduce((m, v) => v != null ? Math.max(m, v) : m, 1e-15) || 1;
  document.getElementById('scale-profile').innerHTML =
    z_metres.map((v, d) => {
      if (v == null) return `<div class="scale-row"><span style="color:#202038;width:28px">D${d}</span><div class="scale-bar"><div class="scale-fill" style="width:0%;background:#1a1a30"></div></div><span class="scale-z">—</span></div>`;
      const pct = (v / zMax) * 100;
      const col = DEPTH_BRIGHT[d] || '#888';
      return `<div class="scale-row">
        <span style="color:${col};width:28px;font-size:9px">D${d}</span>
        <div class="scale-bar"><div class="scale-fill" style="width:${pct.toFixed(1)}%;background:${col}88"></div></div>
        <span class="scale-z">${fmtZ(v)}</span>
      </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════════════════
window.selLayer = function(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.layer-item').forEach((el, i) =>
    el.classList.toggle('sel', i === idx));
  meshes.filter(m => !m._wire).forEach(({ mesh, layer }, i) => {
    const layerIdx = lastReport?.layers.findIndex(l => l === layer) ?? -1;
    mesh.material.opacity = (layerIdx === idx) ? 0.7 : globalOpacity;
  });
};

window.onDepth = function(v) {
  currentDepth = v;
  document.getElementById('depth-val').textContent = v;
  if (lastReport) buildScene(lastReport);
};

window.onOpacity = function(v) {
  globalOpacity = v;
  document.getElementById('opacity-val').textContent = v.toFixed(2);
  meshes.filter(m => !m._wire).forEach(({ mesh }) => {
    mesh.material.opacity = v;
  });
};

window.onExplode = function(v) {
  explodeFactor = v;
  document.getElementById('explode-val').textContent = v.toFixed(1);
  if (lastReport) buildScene(lastReport);
};

window.onClip = function(v) {
  clipPlane.constant = v;
  clipActive = v < 1.15;
  renderer.localClippingEnabled = clipActive;
  document.getElementById('clip-val').textContent = clipActive ? fmtZ(v * 1.0) : 'off';
  if (lastReport) buildScene(lastReport);
};

window.selectEntity = async function(v) {
  currentEntity = v;
  document.getElementById('custom-row').style.display = v === 'custom' ? 'flex' : 'none';
  await ensureCalibrated(v);
  await fetchLayers();
};

window.togglePoll = function() {
  polling = !polling;
  document.getElementById('btn-poll').textContent = polling ? 'PAUSE' : 'RESUME';
  document.getElementById('btn-poll').classList.toggle('active', !polling);
  if (polling) schedulePoll();
};

window.calibDialog = async function() {
  const host = document.getElementById('host-in').value.trim();
  const type = prompt('Entity type to calibrate (e.g. "game_console", "cell"):');
  if (!type) return;
  const scale = parseFloat(prompt('Known physical size in metres\n(e.g. 0.30 for 30cm, 7e-9 for 7nm):'));
  if (!scale || isNaN(scale)) return;
  const r = await fetch(`http://${host}/overlay/layers/calibrate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ entity_type: type, known_scale_m: scale }),
  }).then(r => r.json()).catch(e => ({ error: String(e) }));
  alert(r.ok ? `Calibrated: ${type} = ${scale} m` : `Error: ${r.error}`);
  await fetchLayers();
};

window.refresh = fetchLayers;

function setStatus(text, color) {
  document.getElementById('statustext').textContent = text;
  document.getElementById('statusdot').style.background = color;
}

function schedulePoll() {
  clearTimeout(pollTimer);
  if (polling) pollTimer = setTimeout(async () => {
    await fetchLayers();
    schedulePoll();
  }, 2500);
}

// ═══════════════════════════════════════════════════════════════════
// Raycasting — hover tooltip
// ═══════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse2    = new THREE.Vector2();
const tip       = document.getElementById('tip');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse2.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse2.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse2, camera);
  const hits = raycaster.intersectObjects(
    meshes.filter(m => !m._wire).map(m => m.mesh)
  );

  if (hits.length) {
    // Take the hit closest to camera that corresponds to a real layer.
    const hit  = hits[0];
    const entry = meshes.find(m => m.mesh === hit.object && !m._wire);
    if (entry) {
      const l  = entry.layer;
      const zs = fmtZ(l.position.z_est_m);
      const conf = (l.position.z_confidence * 100).toFixed(0);
      const label = l.label.replace(/^txt:\w+_|^img:/g,'').replace(/_zone.*$/,'');
      const subs  = l.components.slice(0,5)
        .map(c => c.replace(/^txt:\w+_|^img:/g,'').replace(/_zone.*$/,''))
        .join(', ');
      tip.style.display = 'block';
      tip.style.left    = (e.clientX - rect.left + 14) + 'px';
      tip.style.top     = (e.clientY - rect.top  + 14) + 'px';
      tip.innerHTML     = `<b>Depth ${l.depth}</b> — ${label}<br>` +
                          `z = ${zs}  (${conf}% confidence)` +
                          (l.position.z_from_eem ? ' <span style="color:#f0b010">⚡EEM</span>' : '') +
                          (subs ? `<br><span style="color:#404060">${subs}</span>` : '');
      canvas.style.cursor = 'crosshair';
      controls.autoRotate = false;
      return;
    }
  }
  tip.style.display   = 'none';
  canvas.style.cursor = 'default';
  if (!userInteracting) controls.autoRotate = true;
});

// ═══════════════════════════════════════════════════════════════════
// Render loop
// ═══════════════════════════════════════════════════════════════════
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

function animate() {
  requestAnimationFrame(animate);
  resize();
  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════════
// Keyboard
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const sl = document.getElementById('depth-sl');
  if (e.key === 'ArrowLeft' || e.key === '[') {
    sl.value = Math.max(0, currentDepth - 1);
    window.onDepth(+sl.value);
  } else if (e.key === 'ArrowRight' || e.key === ']') {
    sl.value = Math.min(5, currentDepth + 1);
    window.onDepth(+sl.value);
  }
});

// ═══════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════
async function init() {
  animate();
  // Register all calibrations upfront.
  const host = document.getElementById('host-in').value.trim();
  await Promise.all(
    Object.entries(PROFILES)
      .filter(([, p]) => p.known_scale_m)
      .map(([type, p]) =>
        fetch(`http://${host}/overlay/layers/calibrate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entity_type: type, known_scale_m: p.known_scale_m }),
        }).catch(() => {})
      )
  );
  await fetchLayers();
  schedulePoll();
}

init();
</script>
